玉骨身已輕此箇景象惟自身上昇早得朝三清三清聖位我亦有本來只奪乾坤精飮凡酒食羶腥補養元和中更盈自融結轉光明變作珍珠飛玉京須臾六年腸不餒血化白膏體難毁不食方爲真絶糧真氣薰蒸肢體强既不食超百億口鼻都無凡喘息真人以踵凡以喉從此真凡兩邊立到此遂成無漏身胎息丹田湧真火老氏自此號嬰兒火候九年都經過留形住世不知春忽爾天門頂中破真人出現大神通從此天仙可相賀聖賢三教不異門昧者勞心休恁麽有識自愛生有形終不滅嘆愚人空駕說愚人流蕩無則休落趣循環幾時徹學人學人細尋覓且須研究古金碧金碧參同不計年妙中妙兮玄中玄勉牛生夏侯歌二秀才二秀才兮非秀才非秀才兮是仙才中華國裏親遭遇仰面觀天笑眼開一作回鶴形兮龜骨龍吟兮虎顔我有至言相勸勉願君兮勿清勿清但煦日吹風嚥雨呵雷火寄冥宫水濟丹臺金木交而土歸位鈆汞分而丹露胎赤血换而白乳流透光竅兮動百骸然然卷然然舒哀哀咍咍孩兒喘而不死腹空虛兮長齋酬名利兮狂歌醉舞酬富貴兮麻裰莎鞋甲子問時休記看桑因變作黄埃青山白雲好居住勸君歸去來兮歸去來寄白龍洞劉道人玉走金飛兩矅忙始聞花發又秋霜徒誇籛壽千來歲也似雲中一電光一電光何太疾百年都來三萬日其間寒暑互煎熬不覺童顔暗中失縱有兒孫滿眼前却成恩愛轉牽纏及乎精竭身枯朽誰解教伊暫駐顔延年之道既無計不免將身歸逝水但看古徃聖賢人幾箇解留身在世身在世也有方只爲時人誤度量競向山中尋草藥伏鈆制汞點丹陽點丹陽事迥别須向坎中求赤血取來離位制隂精配合調和有時節時節正用媒人金翁姹女結親姻金翁偏愛騎白虎姹女常駕赤龍身虎來靜坐秋江裏龍向潭中奮身起兩獸相逢戰一場波浪奔騰如鼎沸黃婆丁老助威靈撼動乾坤之神鬼須臾戰罷雲氣收種箇玄珠在泥底從此根芽漸長成隨時灌溉抱真精十月脫胎吞入口忽覺凡身已有靈此箇事世間稀不是等閑人得知宿世若仙骨分容易如何得遇之金液丹宜便煉大都光景急如箭要取魚須結筌何不收心煉取鈆莫教燭被風吹滅六道輪迴難天近來世上人多詐盡着布衣稱道者問他金木是何般噤口不言如害啞却云服氣與休糧别有門庭道路長豈不見隂君破迷歌裏說太乙含耳法最强莫怪言詞太狂劣只爲時人難鑒别惟君心與我心同方敢傾心與君說題桐栢山黄先生菴門吾有玄中極玄語周遊八極無處吐雲軿飄泛到凝陽一見君兮在玄浦知君本是孤雲客擬話希夷生恍惚無爲大道本根源要君親見求真物其中有一分三五本自無名號丹母寒泉瀝瀝氣綿綿上透崑崙還紫府浮沉升降入中宫四象五行齊見土驅青龍擒白虎起祥風兮下甘露鈆凝真汞結丹砂一派火輪真爲主既修真須堅確能轉乾坤泛海岳運行天地莫能知變化鬼神應不覺千朝鍊就紫金身乃至全神歸返朴黄秀才黄秀才既修真須且早人間萬事何時了貪名貪利愛金多爲他財色身衰老我今勸子心悲切君自思兮生猛烈莫教大限到身來又是隨流入生滅留此片言用表其意它日相逢必與汝决莫退初心善愛善愛呂祖志藝文志漁父詞一十八首入定閉目藏真神思凝杳冥中裏見吾宗無邊半迥朦朧玄景觀來覺盡空初九大道從來屬自然空堂寂坐守機關三田寳鎮長存赤帝分明坐廣寒玄用日月交加曉夜奔崑崙頂上定乾坤真鏡裏實堪論靉靉紅霞曉寂門神效恍惚擒來得自然偷他造化在其間神鼎内火烹煎盡歷隂陽結成丹沐浴卯酉門中作用時赤龍時蘸玉清池雲薄薄雨微微看取妖容露雪肌延壽子午常飧日月精玄關門户啓還扃長如此過平生且把隂陽仔細烹瑞鼎會合都從戊己家金鈆水汞莫須誇只此物結丹砂反覆隂陽色轉華活得位立三才屬五行隂陽合處便相生龍飛踴虎狂獰吐箇神珠各戰爭燦爛四象分明八卦周乾坤男女論綢繆交會處更嬌羞轉覺情深玉體柔鍊質運本還元于此尋周流金鼎虎龍吟身不老俗難侵貌返童顔骨變金神異還返初成立變童瑞蓮開處色輝紅金鼎内迥朦朧换骨添筋處處通知路那箇仙經述此方參同大易顯隂陽須窮取莫顛狂會者名高道自昌朝帝九轉功成盡數乾開爐撥鼎見金丹飱餌了别塵寰足躡青雲突上天方契理舉世人生何所依不求自己更求誰絶嗜慾斷貪癡莫把神明暗裏欺自無憂學道初從此處脩斷除貪愛别嬌柔長守靜處深幽服氣飧霞飽即休作甚物貪責貪榮逐利名追遊醉後戀懽清年不求代君驚一報身終那裏生疾瞥地萬劫千生得個人須知先世種來因速覺悟出迷津莫使輪回受苦辛常自在閉目尋真真自歸玄珠一顆出輝輝終日翫莫抛離免使閻王遣使追夢江南詞十一首淮南法淮南法秋石最堪誇位應乾坤白露飾象移寅卯載河車子午結朝霞王陽術王陽術得秘是黄芽萬蘂初生將此類黄鍾應律始歸家十月定君誇黄帝術黄帝術玄妙美金花玉液初凝紅粉見乾坤覆載暗交加龍虎變成砂長生術長生術玄要補泥丸彭祖得之年八百世人因此轉傷殘誰是識隂丹隂丹訣隂丹訣三五合玄圖二八應機堪採運玉瓊回首免榮枯顔貌勝凡妹長生術長生術初九祕潜龍愼勿從高宜作客丹田流注氣交通耆老反嬰童脩身客脩身客莫誤入迷津氣術金丹傳在世象天象地象人身不用問東鄰還丹訣還丹訣九九最幽玄三牲本同一體内要燒靈藥切尋鉛尋得是神仙長生藥長生藥不用問他人八卦九宫看掌上五行四象在人身明了自通神學道客學道客脩養莫遲遲光景斯須如夢裏還丹粟粒變金姿死去莫回歸治生客治生客審細察微言百歲夢中看即過勸君脩煉保尊年不久是神仙沁園春四首昨日南京今朝天岳悠焉忽焉指洞庭爲酒渴時浩飮君山作枕醉後高眠談笑自如徃來無礙半是風狂半是仙隨身在有一襟風月兩袖雲煙人間放浪多年又排辦東華第二筵把珊瑚砍倒栽吾琪樹天河放淺種我金蓮槌碎玉京賜翻蓬島稽首虛皇王案前無難事信功成八百行滿三千其一火宅牽纏夜去明來早晩無休奈今日不知明日事波波劫劫有甚來由人世風燈草頭珠露我見傷心眼淚流不堅久似石中迸火水上浮漚休休聞早回頭把徃日風流一筆勾但麄衣淡飯隨縁度日任人笑我我又何求限到頭來不論貧富着甚千忙日夜憂勸年少把家縁棄了海上來遊其二詩曲文章任汝空留數千萬篇奈日推一日月推一月今年不了又待來年有限光隂無涯火院只恐蹉跎老却賢貪癡漢望成家學道兩事雙全凢夫只戀塵縁又誰信壺中别有天道本情不親富貴不踈貧賤只要心堅不在勞神不須苦行息慮忘機合自然長生事待明公放下方可相傳其三七返還丹在人先須煉已待時正一陽初動中宵漏永温温鉛鼎光透簫幃造化爭馳虎龍交媾進火功夫猶鬭危猶鬭危元作牛斗危玉蟾訣亦云妙在尾箕牛斗女正爲一陽初動之位今或作猶鬬危恐非是曲江上看月華瑩淨有箇烏飛當時自飮刀圭文誰信無中養就兒辯水源清濁木金間隔不因師指此事難知道要玄微天機深遠下手速脩猶太遲蓬萊路待三千行滿獨步雲歸其四雜曲十首稽首鍾離群真領袖道天地先身天地後顛倒乾坤縱橫宇宙唐朝吕仙祕訣親授咦蓬壼碧落幾遨遊萬古豐神常似舊何處去浪苑瀛洲風細細何處來胡麻飯罷下天臺咄自從二祖談玄後海上金蓮萬朵開心空道亦空風靜林還捲盡浮雲月自明中有山河影供養及脩行舊話成重省豆爆生蓮火裏時痛撥寒灰冷右卜筭之坎離坤兊逢子午須認取自家根祖地雷震動山頭雨要洗黄芽出士捉得金精牢閉錮煉甲庚要生龍虎待他問汝甚人傳但說道先生姓吕向有一太守好道令妓者唱道情詞曲妓無以應命遂迎方士求之忽有道人過門索酒題詞于壁而去次日妓佐公筵以此歌之太守驚問欲求道人竟失其蹤方知其爲吕公也妓亦因此脫籍右步蟾宫大道淵源高真隱秘風流豈可知聞先天一氣清濁自然分不識坎離顛倒誰能辯金木浮沉幽微處無中產有澗畔虎龍吟壼中真造化天精地髓隂魄陽魂運周天水火燮理寒温十月脫胎丹就除此外皆是傍門君知否塵寰走徧端的少知音右滿庭芳仙風道骨顛倒運乾坤平分時節金木相交坎離位一粒刀圭凝結水虎潜形火龍伏體萬丈毫光烈仙花朵秀聖男靈女扳折霄漢此夜中秋銀蟾離海浪捲千層雪此是天關地軸誰解推窮圓缺片餉功夫霎時丹聚到此憑何訣倚天長嘯洞中無限風月右酹江月曰前咫尺長生路多少愚人不悟愛河浪闊洪波風緊丹船難渡略聽仙師語到彼岸只消一句煉金丹换了凡胎濁骨免輪迴三塗苦萬事澄心定意聚真陽都歸一處分明認得靈光真趣本來面目此箇幽微理莫容易等閑分付知蓬萊自有神仙伴侣同携手朝天去右永龍吟我有屋三椽住在靈源無庶四壁任蕭然萬象森蘿爲斗拱瓦蓋青天無漏得多年結就因縁脩成功行滿三千降得火龍伏得虎陸地神仙右浪淘沙天不高地不大惟有真心物物俱含下不用之全體在用即拈來萬象周沙界虛無中塵色内盡是還丹歷歷堪收採這箇鼎爐解不解養就靈烏飛出光明海右蘇幕遮三百年間功標青史幾多俱委埃塵悟黄梁棄儒事厭世藏身將我一枝丹桂换他千載青春岳陽樓上綸巾羽扇誰識天人蓬萊願應仙舉誰知會合仙賔遥望吹笙玉殿奏舞鸞裀風馭雲軿不散碧桃紫㮏長新願逢一粒九霞光裏相繼朝真右雨中花題岳陽樓西風吹渭水落葉滿長安茫茫塵世裏獨清閑自然爐鼎虎繞與龍盤九轉丹砂就一粒刀圭便成陸地神仙從他富貴擁華軒到了亦徒然黄梁猶未熟夢驚殘是非海裏終乆立身難拂袖江南去白蘋紅蓼再遊湓浦盧山右促拍滿路花題長安酒樓桂吕祖志卷六終
