front:
  text: 吕祖志目録輦一
  hash: sha256:e95e71f283624099d1c0a93273dac6d314efb93b2cc69740cb8db50941eb58d8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0054_SJB_000-360446a, image: sjb/36/360446a.png}
body:
  text: 圖像三事蹟志真人本傳附雲房十試真人真人十問雲房真人自記真人度盧生枕中記神通變化二十二條更名顯化一十六條晋謁儒門八條經遊寺觀十條市廛混跡八條庵堂赴會七條丹藥濟人七條因縁會遇五條藝文志五言古風一篇七言古風二篇五言絶句四首五言律詩一十八首七言絶句四十二首七言律詩六十首七言律詩六十一首雜著十條歌九篇漁父詞一十八首夢江南詞一十一首沁園春四首雜曲九首目録終四月十五日降生二月十八日上昇四月十四日降生五月二十日上昇吕祖志事續志真人本傳吕嵒字洞賔一名嵒客一云初紹先唐河中府永樂縣人一云蒲坂一云河東曾祖延之終浙東節度使祖渭終禮部侍郞父讓海州刺史貞元十四年四月十四日已時生母就縟時異香滿室天樂浮空一白鶴自天飛下竟入帳中不見生而金形木質道骨仙風鶴頂龜背虎體龍腮翠眉層稜鳳眼朝鬢頸修顴露額闊身圓鼻梁聳直面色黃白左眉角一黑子左眼下一黑子筋頭般大如功曹使者狀兩足下紋隱起如龜少聦敏日記萬言矢口成文既長身五尺二寸喜頂華陽巾衣黄白襴衫繫大皂條狀類張子房二十不娶始在襁褓馬祖見之曰此兒骨相不凡自是風塵表物他時遇廬則居見鍾則扣留心記取後遊於廬山始遇火龍真人傳天遁劒法自是混俗貨墨於人間號純陽子咸通中舉進士第一云開成時年六十四歲一云年五十始知道六十四卦已盡乃始於乾此純陽之應後遊長安酒肆見一羽士青巾白袍長髯秀目手携紫笻腰掛大瓢書三絶白於壁一曰坐卧常携酒一壺不教雙眼識皇都乾坤許大無名姓䟽散人中一丈夫二曰得道真仙不易逢幾時歸去願相從自言住處連滄海别是蓬萊第一峰三曰莫厭追歡笑語頻尋思離亂可傷神間來屈指從頭數得到清平有幾人洞賔訝其壯貌竒古詩意飄逸因揖問姓氏羽士曰吾鍾離其姓權其名雲房其字洞賔再拜延坐異人曰可吟一絶予欲觀之洞賔筆不停綴書二十八字曰生在儒家遇太平懸纓重滯布衣輕誰能世上爭名利臣事玉皇歸上清異人見詩喜曰予所居在終南鶴嶺可從予此行否洞賔因隨雲房同憩肆中雲房自起執炊洞賔忽欲昏睡枕案遑假夢以舉子赴京狀元及第始自州縣小官擢朝署由是臺諫給舍翰苑祕閣郞曹從橐諸清要無不備歷升而復黜黜而後升前後兩娶富貴家女婚嫁蚤畢孫甥振振簪笏滿門如此幾四十年最後獨相十年權勢熏炙忽被重罪籍没家資分散妻孥流於嶺表一身孑然窮苦憔悴立馬風雪中方此浩歎恍然夢覺雲房在傍炊尚未熟笑曰黄梁猶未熟一夢到華胥洞賔驚曰君知我夢耶雲房曰子適來之夢升沉萬態榮悴多端五十年間一頃耳得不足喜喪何足憂且有大覺而後知此人間世事真大夢也洞賔感悟慨歎知宦途不足戀矣再拜曰先生非凡人也願求度世術雲房詭曰子骨節未完志行未足若欲度世須更數世可也翩然别去洞賔怏怏自失棄官歸隱雲房自是十試洞賔皆過見後一日忽一人撫掌大笑而下即雲房也謂洞賔曰塵心難滅仙才難偵吾之求人甚於人之求吾也吾十度試子皆過了得道必矣但功行尚有未完吾今授子黄白秘方可以濟世利物使三千功滿八百行圓吾來度子洞賔曰所作庚辛有變異乎曰三千年後還本質耳洞賔愀然曰誤三千年後人不願爲也雲房笑曰子推心如此三千八百悉在是矣因與洞賔叙其得道來歷曾遇苦竹真君謂吾曰汝此去遊人間若遇人有兩口者即汝弟子吾後遍遊山海竟未見人有兩口者今詳君姓實符苦竹之記矣又曰君能從我遊乎洞賔因隨之至鶴嶺見一小洞星月交輝四顧寂寥雲房執洞賔手偕行纔數步恍如騎快馬歷山川俄頃已至洞南門下鎖埃雲房以碧絛繫洞賔帶俱從門隙中入豁然開朗登一高峰至一大洞門東前有二虎踞守雲房叱之虎伏不動乃引洞賔入金樓玉臺珍禽琪樹光景照曜氣候如春相與坐盤陀石飲元和酒三杯談道未竟俄有一青衣雙髻金鈐朱裳翠袂雲履玉佩異香氤氲手持蠒紙金書曰群仙已集蓬萊上宫要先生赴天池會論五元真人神遊記事雲房將去洞賔送以詩曰得道來來相見難又聞東去幸仙壇杖頭春色一壼酒頂上雲攢五嶽冠飮海龜兒人不識燒山符子鬼難看先生去後身須老乞與貧儒换骨丹蓋慮雲房之不返也雲房曰汝但駐此吾去不久遂望東南乘紫雲冉冉而去洞賔遂將雲房所付素書數卷披閱誦玩獨處洞中旬日雲房回曰子在是岑寂得無欲歸否洞賔曰既辦心學道豈有家山思乎雲房曰善哉善哉汝等不知分合隂陽之妙守隂則只是魄存陽則只是魂若能聚其陽魂以合隂魄使隂陽相會魂魄同真是謂真人洞賔曰魂魄冥冥至理甚深何以全形師曰慧發㝠㝠泰定神靈神既混合豈不契真金形玉質本出精誠大藥既成身乃飛輕洞賔自是凡十問脩真之說見後雲房悉傳以上真玄訣盡豁塵濁俄有叩户者乃清溪鄭思遠與太華施真人由東南而來緩步凌虛體凝金碧相揖共坐曰契闊來乆適尹思逸煉丹所遂造仙扉施真人曰此一侍者何也師曰本朝吕海州讓之子少習儒墨失意上國邂逅長安酒肆從吾奉道通隂陽制煉形神入妙之微洞賔乃拜二僊鄭尹曰形清神在目秀精藏子欲脫塵網可示一詩授洞賔金管霞牋靈膠犀硯洞賔立獻詩曰萬劫千生到此生此生身始覺飛輕抛家别國雲山外煉魄全魂日月精比見至人論九鼎欲窮大藥訪三清如今獲遇真仙面紫府仙扉得姓名三僊相視嘆其才清句麗時春禽㗀嚶師謂洞賔曰可於洞口題曰春氣塞空花露滴朝陽拍海岳雲歸又謂洞賔曰吾朝元有期十洲羽客至玉京奏此功行以陞仙階汝恐不久居此洞後十年洞庭湖相見取筆於洞中石壁草書一十六字曰晝日高明夜月圓清隂陽魂神混合上昇擲筆吿洞賔曰世間游行當施利濟之道行滿功成復相際會時雲房又以靈寳畢法授洞賔始雲房於終南石壁間得靈寳經三部上部元始金誥中部曰元皇玉籙下部曰太上真元義凡數千卷雲房撮其要爲畢法分十二科及六義蓋明隂中有陽陽中有隂天地升降之道氣中生水水中生氣心腎交合之機以八卦運十二時而其要在艮以三田互相反復而其要在泥丸至下手工夫姑借咽氣嗽液爲喻而真機口訣實在口傳心授不在文字間也雲房又以靈丹數粒示洞賔曰此非世間五金八石乃世間異寳合成雖有質而無形如雲如火如光如影可見而不可執服之與人魂識合爲一體輕虛微妙非如有形之丹也復贈詩一章曰知君幸有英靈骨所以教君心恍惚含元殿上水晶宫分明指出神仙窟大丈夫遇真訣須要執持心猛烈五行匹配自刀圭執取龜蛇顛倒訣三尸神須打撒進退天機明六賊知之三要萬神歸來駕火龍離九闕九九道至成真日三界四府朝元節氣翺翔兮神恒爀蓬萊便是吾家宅群仙會飮天樂喧雙童引入昇玄客道心不退故傳君立誓約言親洒血逢人兮莫亂說遇友兮不須訣莫怪頻發此言辭輕慢必有隂司折執手相别意如何今日爲君重作歌說盡千般玄妙理未必君心信也麽子後分明說與汝保惜吾言上大羅鍾吕授受將畢忽有二仙綃衣霞彩手捧金簡寳符云上帝詔鍾離權爲九天金闕選仙使謂洞賔曰吾即昇天汝好住世間修功立德他時亦當如我洞賔再拜曰嵒之志異於先生必須度盡天下衆生方上昇未晩也於是翔鸞彩鳳金幢玉節仙吹嘹喨鍾離先生與捧詔二仙乘雲冉冉而去洞賔既得雲房之道又得火龍真人傳天遁劒法一斷煩惱二斷色慾三斷貪嗔嘗有詩曰昔年曾遇火龍君一劒相傳伴此身天地山河從結沬星辰日月任停輪須知本性綿多劫空向人間歷萬春昨夜鍾離傳一語六天宫殿欲成塵洞賔初遊江淮試靈劒遂斬長蛟之害隱顯變化不一迨今四百餘年其對雲房發大誓願至今浮沉濁世行化度人洞賔今雖在世然已出離世間矣洞賔曰世人兢欲見吾既見吾而不能行吾言雖日夕與吾同處何益哉人若能忠于國孝友于家信于交友仁于待下不慢自心不欺暗室以方便濟物以隂隲格天人愛之鬼神敬之即此一念已與吾同雖不見吾猶見吾也蓋人之性念于善則屬陽明其性入于輕清此天堂之路念于惡則屬隂濁其性入于粗重此地獄之階天堂地獄非果有主之者特由人心自化成耳宋藝祖建隆初洞賔自後苑出對上稱朱陵上帝以火德王天下留語移時語秘不傳上解赭袍玉帶賜之俄不見上命繪像于太清樓道録陳景元傳其像於世政和中宫禁有崇白晝現形盜金寳姦妃嬪獨上所居無患自林靈素王文卿諸侍宸等治之息而復作上精齋虔禱奏詞凡六一日書寢見東華門外有一道士碧蓮冠紫鶴氅手持水晶如意前揖上曰臣奉上帝命來治此崇良久一金甲丈大捉劈而啗之且盡上問丈夫何人道士曰此乃陛下所封崇寍真君關羽也上勉勞再四復問張飛何在羽曰飛乃臣累劫兄弟今已爲陛下生于相州岳家他日輔佐中興飛將有功焉上問卿姓名曰臣姓陽四月十四日生夢覺録之召侍宸言之意其爲洞賔也自是宫禁帖然遂詔天下有洞賔香火處皆正妙通真人之號蓋自此始其詞曰朕嘉與民偕之大道凡厥仙隱具載册書而况默應禱祈宜示恩寵吕真人匿景藏文遠邇游方逮建福庭適有寓舍歎兹符契錫以號名神明儼然尚垂昭鑒可封妙通真人塑像於景靈宫歲時奉祀焉雲房十試洞賔第一試洞賔自外遠歸忽見家人皆病死洞賔心無悼怛但備葬具既而死者皆起無恙第二試洞賔鬻貨于巿義定其直巿者翻然止酬其直之半洞賔無所爭併直之半皆不取委貨而去第三試洞賔元日出門忽丐者倚門求施洞賔與以錢物而丐者索不已且出惡言嫚罵抽刃相向洞賔再三禮謝披襟受刃丐者笑而去第四試洞賔牧羊山中遇一虎追逐漸逼洞賔推羊下峻阪而獨以身當之虎即釋去第五試洞賔獨居山中草舍讀書一日危坐忽見一女年可十七八容華絶世光艷照人粧飾靚麗自言歸寍母家至此迷路日云暮矣足弱倦行借此少憩言訖顰眉嬌咤弱不自勝既而窈窕萬態調戲百端迨夜逼同寢而洞賔竟不爲動如是三日始辭去第六試洞賔一日出郊暨歸則家資已爲劫盜席捲殆無以供朝夕洞賔無愠色躬耕自給忽於鋤下見金數十餅速揜之一無所取第七試洞賔見有貨銅器者巿之以歸則皆金也即訪賣主還之第八試有風狂道士坊陌上巿藥自言服者立死旬日不售洞賔謂此必有意因買藥歸道士曰子速備後事可也吾將行矣既而服之無恙第九試洞賔因春潦汎溢衆方病涉獨棹一小舟至中流風濤掀舞而洞賔端坐不動任生任死竟亦無虞第十試洞賔獨坐一室忽見竒形怪狀鬼神無數有見擊者有欲殺者洞賔一切不問復有夜叉數十械一死囚血肉淋瀝哭泣號叫言汝宿世殺我今急償我命洞賔曰殺命償命宜也其又奚辭遽索刀繩欲自盡忽聞空中叱聲鬼神皆不復見乃是雲房撫掌大笑而下洞賔十問雲房第一問天地曰乾三索而天交于地乃生三陽坤三索而地交于天乃生三隂陽中藏隂乃曰真隂真隂到天因陽而生隂中藏陽乃曰真陽真陽到地因隂而發交合得道自然長乆第二問曰月曰月受日魂以陽變隂隂極陽純月華瑩淨修煉到此積氣成神第三問四時五行曰一心自有五行一日自有四時大抵隂陽相推而已陽不得隂不成到底無隂而不死隂不得陽不生到底隂盡而皆陽第四問水火龍虎曰身中有君火臣火民火真火出於水中恍恍惚惚其中有物視之不可見取之不可得真水生於火中杳杳㝠㝠其中有精見之不可留留之不可住腎水也水中有氣名曰真火心火也火中生液名曰真水以水生木腎氣足而肝氣生以絶腎之餘隂而氣過肝時即爲純陽藏真一之水恍惚名真龍以火尅金心液盛而肺液生以絶心之餘陽而液到肺時即爲純隂藏正陽之氣杳冥名真虎氣中取水水中取氣日得黍大歸於黄庭此大丹也第五問鉛汞曰鉛性沉重而喜墜此腎水以潤下而易漏汞性輕飛而喜升此心火以炎上而易散以鉛制汞以沉重而鎮輕飛内丹結矣第六問抽添曰冬至後陽升于地地抽其隂太隂抽而爲厥隂少陽添而爲陽明厥隂抽而爲少隂陽明添而爲太陽夏至後隂降于天天抽其陽太陽抽而爲陽明少隂添而爲厥隂陽明抽而爲少陽厥隂添而爲太隂又如日月月受日魂日受月魄前十五日月抽其魄而日添其魂精華已滿光照下土不然無初生而變上弦上弦而變月望也月還隂魄日收陽精後十五日日抽其魂而月添其魄光照已謝隂魄已定不然無月望而變下弦下弦而變晦朔也日月徃復而變九六此抽添之象也第七問河車曰人身陽少隂多無非是水故有取於河車之誼河車起於北方正水中而非若旁門搬運力也第八問内觀坐忘之妙曰龍虎交媾隂陽配匹九皇真人引一朱衣童子下降九皇真母引一皂衣女予上升相見黄屋之前有一黃衣老嫗接引如夫婦之合盡時歡洽女復下降男復上升如夫婦之離既畢產一物大如彈丸色同朱橘抛入黄屋以金氣盛留第九問如此修行有魔難否因子知十魔九難乎衣食逼迫一難也恩愛牽纏二難也利名縈絆三難也灾患橫生四難也盲師約束五難也議論差别六難也志意懈怠七難也歲月蹉跎八難也時世亂離九難也一六賊魔二富貴魔三六情魔四恩愛魔五患難魔六神佛爲害是聖賢魔七刀兵魔八女樂魔九女色魔十貨利魔第十問有何證驗曰始也淫邪盡絶外行兼修探藥之際金晶充滿隂魄銷融次心經湧溢口出甘液次隂陽擊搏腹鳴如雷次魂魄未定夢寐驚恐次或生微疾不療自愈次丹田夜暖形容盡清次若處暗室而神光自現次若抱嬰兒而上歸金闕次雷鳴一聲關節通而驚汗四溢次玉液烹煉成凝酥而雪花散墜或化血成乳而漸畏腥膻或塵骨將輕而漸變金玉次行如奔馬次對景無心次吹氣療疾次内觀明朗次雙晴如漆次紺髮再生次真氣足而常自飽次食不多而酒無量次神體光澤精氣秀媚次口生異味鼻有異香次目視萬里次瘢痕銷滅次涕淚涎汗皆絶次三尸九蟲悉除次内志清高上合太虛凡清皆歇心境俱空次魂魄不游夢寐自絶神采晶爽不分晝夜次陽精成體靈府堅固寒暑不犯生死不干次噓呵可乾外汞次神光常生坐卧次靜中時聞天樂金石絲竹之清非世所常聞次内觀或游華胥樓臺殿閣之麗非世所常見次見凡人腥穢次見内神出現次見外神來朝功圓行滿膺籙受圖紫霞滿目金光覃體或見火龍飛或見玄鶴舞綵雲繚繞瑞氣繽紛天花亂墜神女下降出凡入聖逍遥自然此乃大丈夫功成名遂之日也真人自記吾京川人唐末三舉進士不第因游江湖間遇鍾離子受延命之術尋又遇苦竹真君傳日月交並之法乆之適終南山再見鍾離子得金液大丹之功年五十道始成身長五尺二寸面黄白鼻聳直左眉有黑子服白欄衫繫皂絛變化不可測或爲進士或爲兵世多稱吾能飛劒戮人者吾聞之笑曰慈悲者佛也仙猶佛爾安有取人命乎吾固有劒蓋異於彼一斷貪嗔二斷愛慾三斷煩惱此其三劒也吾道成以來所度者何仙姑郭上竈二人性通利吾授之以歸根法吾嘗謂世人奉吾真何若行吾行既行吾行又行吾法不必見吾自成大道不然日與吾遊何益哉此記見江州望江亭真人度盧生枕中記開成七年道士有吕翁者得神仙術行邯鄲道中息邸舍攝𢂱弛囊而坐俄見旅中少年乃盧生也名英衣短褐乘青駒將適於田亦止旅中與翁共席而坐言笑殊暢久之盧生顧其衣裝弊褻乃長嘆息曰大丈夫生世不諧困如是也翁曰觀子形體無苦無談諧方適而嘆其困者何也生曰吾苟此生耳何適之謂翁曰此不謂適而何謂適荅曰士之生世當建功樹名出將入相列鼎而食選聲而聽使族益昌而家益肥然後可以言適乎吾嘗志於學富於游藝自惟當年青紫可拾今已過壯猶勤𤱶畆非困而何言訖而目昏思寐時主人方蒸黍翁乃探囊中枕以授之曰子枕吾枕當令子榮之如志其枕青甆而竅其兩端生俛首就之見其竅漸大明朗乃舉身而入遂至其家數月娶清河崔氏女女容甚麗産質愈厚生大悅由是衣裝服馺日益鮮盛明年舉進士登第釋褐祕校應制轉渭南尉俄遷監察御史轉起居舍人知制誥三載出興同州遷陜郊生性好上功自陜西鑿河八十里以濟不通邦人利之刻石紀德移節汴州領河南採訪使徴爲京兆尹是歲神武皇帝方事戒狄恢弘土宇會吐蕃悉採邏及燭龍莾布支攻陷瓜沙而節度使王君毚新被殺河湟震動帝思將帥之才遂除御史中丞河西道節度大破戎虜斬首七千級開地九百里築大城以遮要害邊人立石於居延山以頌之歸朝册勳恩禮極盛轉吏部侍郞遷户部尚書兼御史大夫時望清童群清翕習大爲時宰所忌以飛語中之貶爲端州刺史三年徴爲常侍未幾同中書門下平章事與蕭中令蒿裴侍中光庭同執大政十餘年嘉謨宻命一日三接獻替啓沃號爲賢相同列害之復誣與邊將交結所圖不軌下制獄府吏引徒至其門而急收之生惶駭不測謂妻子曰吾家山東有良田五頃足以禦寒餒何苦求禄而今及此思衣短褐乘青駒行邯鄲道中不可得也引刀自刎其妻救之獲免其羅者皆死獨生省定爲中官保之減罪死投驩州數年帝知寃復追爲中書令封燕國公恩㫖殊異生五子曰儉曰僔曰位曰倜曰倚皆有才器儉進士登第爲考功員外僔爲侍御史位爲太常丞倜爲萬年尉倚最賢年二十八爲左衮其姻媾皆天下望族有孫十餘人兩竄荒徼再登台鉉出入中外徊翔臺𨵫五十餘年崇盛赫奕性頗奢蕩好伏樂後亭聲色皆第一綺麗前後賜良田甲第隹人名馬不可勝數後年漸衰邁屢乞骸骨不許病中人候問相踵於道名醫上藥無不至焉將殁上䟽曰臣本山東諸生以田園爲娱偶逢聖運得列宫叙過蒙殊奬特被鴻私出擁節旌入昇台輔周旋中外綿歷歲時有忝天恩無禆聖化負乘貽寇履薄增憂日懼一日不知老至今年逾八十位極三公鍾漏並歇筋骸俱耄彌留沉頓待時益盡顧無試效上荅休明空負深恩永辭聖代無任感戀之至謹奉表陳謝詔曰卿以俊德作朕元輔出擁蕃翰入贊雍熙昇平二紀實卿所賴比攖疾疹日謂痊平豈斯沉痼良用憫惻今令驃騎大將軍高力士就第候省其勉加鍼石爲予自愛猶冀無妄期於自廖是夕盧生欠身而寤見其身方偃於邸憮舍吕翁坐其傍主人蒸黍未熟觸類如故生蹶然而興曰豈期夢寐也翁謂生曰人生之適亦如是矣生憮然良久謝曰寵辱之道窮通之運得喪之理死生之情盡知之矣此先生所以窒吾欲也敢不受教稽首再拜而去吕祖志輦二事績志神通變化二十二條武昌市桃洞賔遊武昌詭爲道人生惡瘡露腹潰爛卧於黃鵠山下口稱摩我肚摩我肚人見臭穢率不敢近初不知摩我度你爲隱語也次日叉詭爲貿易人山下賣大桃人來買者即扣其故見人皆云買與兒與女喫並無說買與父與母喫者真人大嘆世情偷薄將桃盡抛棄之懸於山崖爛成跡今黄鵠山下建有仙跡亭云武昌賣墨洞賔遊武昌詭爲貨墨客墨一笏僅寸餘而價錢三千連日不售衆咸笑侮有鼓刀王某曰墨小而價高得無有意耶自以錢三千求一笏且與客劇飲醉歸昏睡午夜俄有叩户者乃客以錢還之辭去比曉視墨乃紫磨金一笏上有吕字遍尋客已不復見武昌鬻梳洞賔遊武昌天心橋詭姓名鬻敝木梳索價千錢連月不售俄有老媪行乞年八十餘龍鍾傴僂秃髮如雪洞賔謂曰世人循目前襲常見吾穹價貨敝穢物豈無意而千萬人咸無超卓之見尚可與語道耶乃以梳爲媪理髮隨梳隨長鬢黑委地形容變少衆始神之爭以求梳洞賔笑曰見之不識識之不見乃投梳橋下化爲蒼龍飛去洞賔與媪不見羅浮畫山洞賔遊羅浮朱明觀至小庵中值道士他出獨一小童在童揖曰先生坐此乎遂竊道士酒以獻洞賔滿飮使小童盡其餘童不屑童素患左目内障洞賔以所餘酒嚶其目忽然開明若素無患者乃取筆畫一山于壁山下作池三口謂童曰汝飲吾酒則得仙矣不飮命也然亦當享萬壽言訖飛入石壁隱去及道士歸見所畫山徹壁内外大驚曰山下三口乃嵒字非吕先生乎後童果百五歲而終廬山淬劒洞賔遊江州廬山真寂觀臨砌淬劒道士侯用晦問之曰先生劒何所用曰地上一切不平事以此去之侯心異之以酒果召飲謂曰先生道貌清高必非風塵中人洞賔曰且劇飲無相窮詰既醉以筯頭書劒詩一首于壁曰欲整鋒鋩敢憚勞凌晨開匣玉龍嘷手中氣槩冰三尺石王精神蛇一條姦血默隨流水盡凶豪今逐漬痕消削平浮世不平事與爾相將上九霄題畢初見若無字而墨迹燦然透出壁後侯大驚再拜因問劒詩曰有道劒有法劒道劒則出入无形法劒則以術治之者此俗眼所共見但能除妖去崇耳侯曰今以道劒殺戮奸人于稠衆中得不駭俗乎曰人以神爲母氣爲子神存則氣聚神去則氣散但戮其神則去其氣而人將自没或假於人皆此類也侯歎曰此真仙之言也願聞姓氏曰吾吕嵒也言訖因擲劒于空中隨之而去廣陵散錢洞賔常遊廣陵巿以十千錢散之坊陌暨翼日晩視之十千拾者無遺止遺其三一落泥中一落草中一落井中磚石縫去井口三寸許最後有兩人汲水見而爭取之復嘆世人財利之心如此也捚土爲香宋朝張天覺爲相日有縷一道人及門求施公不知禮敬戲問道人有何仙術答以能捚土爲香公請試爲之須臾香煙罷道人不見但留詩於案上云捚土爲香事有因世間宜假不宜真皇朝宰相張天覺天下雲遊吕洞賔水化成酒馬善東都人熙寧初舉進士不第學道一日與一侯道人行汴水見一羽士青巾布袍體秀骨異目如明水面無塵土馬召啜茶且飲食之侯性素嗔吒之羽士曰吾有不死法侯詰之羽士曰汝有何法侯曰飛符召鬼點石化金歸錢返璧羽士曰子所爲皆非正法侯曰子何能曰吾能壯吾氣清吾神侯曰何謂壯吾氣羽士曰但試觀之乃吐氣射酒肆去燭數十丈而燭立滅復吐氣吹侯面若驚風大發凛凛不可支二人起謝曰先生非凡人也幸見教羽士曰學仙須立功行功即勤苦修煉行即濟人利物侯曰弟子平生以藥濟人非功行乎羽士曰子殺物命以救人命是殺彼以生此也不若止用符水愈疾自佳語及曙羽士别去曰吾將返湘水之濱矣與子酌别于柳隂下以百金令侯巿酒適無酒羽士以瓶一隻命侯取汴水一瓶以藥一丸投之立成美酒三人共飮大醉羽士留詩一章曰三口共一室室畔水偏清生來走天下即是姓兼名既别二人思之乃吕洞賔也墨化成金韓忠獻公琦晚年始延方士洞賔鶉衣垢面求謁韓意輕之曰汝何能答曰能墨試令爲之即掘地坎搜焉韓不悅洞賔和揉坎中泥爲墨曰成矣遂去公徐取墨視之乃良金也上有吕字破之徹肌理韓追悔無已紙中方竅監文思院趙應道病瘰癧幾妥頓泣别親舊曰吾死矣夫閨閤中一物皆捨得獨鶴髮老親無托奈何語未竟俄有道人扣門語趙曰病不難愈也取紙二幅各掐其中爲二方竅徑可二尺許以授趙曰俟夜燒一幅灰之調乳香湯塗病上留一幅以待後人言訖道人不復見矣始悟兩方竅乃吕宇也石上方竅梓潼婁道明家富善玄素術常蓄少女十人纔有孕即遣去復置新者常不減十人之數晝夜迭御無休息而神清體徤面若桃紅或經日不食年九十有七止如三十許人尤好誇誕大言對客會飲或言玄女送酒或言素女送果或言彭祖容成輩遺書自以爲真仙也一日洞賔詭爲乞人登門婁不識之叱使去洞賔以兩足踏石上遽成兩方竅深可三寸婁始驚異延置坐右曰子非乞人也出侍女歌游仙詞命之酒洞賔口占望江南詞酬之曰瑤池上瑞霧藹群仙素練金童鏘鳳板青衣玉女嘯鸞笙身在大羅天沉醉處縹緲玉京山唱徹步虛清燕罷不知今夕是何年海水又桑田侍女進蜀牋請書洞賔自紙尾倒書徹紙首字足不遺空隙婁大驚喜方欲請問道要洞賔曰吾已口口相傳矣婁請益復曰吾已口口相傳矣俄登門外大栢樹杪不見後數日婁忽不快吐膏液如銀者數斗而卒口口相傳之說與夫石上兩方竅皆吕字之寓也仙樂侑席陳公執中建甲第東都親朋合樂俄有襤褸道士至即洞賔也陳公問曰子何技能曰我有仙樂一部欲奏以侑華席腰間出一軸畫掛于柱上繪仙女十二人各執樂器道士呼使下如人累累列於前兩女執幢幡以導餘女奏樂皆玉肌花貌嚴態嬌音頂七寳冠衣六銖衣金珂玉珮轉動珊然鼻上各有一教黄玉如黍大而體甚輕虛終不類生人樂音清徹煙霄曲調特異三闋竟陳曰此何物女子道士曰此六甲六丁玉女人學道成則身中三魂七魄五臟六腑諸神皆化而爲此公亦願學否陳以爲幻惑頗不決道士顧諸女曰可去矣遂皆復上畫軸道士取軸張口吞之索紙筆大書曰會經天上三千劫又在人間五百年腰下劒鋒横紫電爐中丹焰起蒼煙纔騎白鹿過滄海復跨青牛入洞天小技等閑聊戲爾無人知我是真仙末題曰谷客書即出門俄不見陳謂谷客乃洞賔也悔恨欲抉曰未幾謝世管片泛波渌江筆師翟某喜接方士洞賔徃謁之翟館于家禮遇殊至自是徃來彌年一日挈翟游江之滸嚙筆管爲二片浮於波上洞賔履其一引筆師效之翟師怖不敢前洞賔笑而濟及岸俄不見翟始知其爲異人也旬浹復來自挈飲食食翟皆臭腐也翟揜鼻謝弗食洞賔太息曰若不能惡食吾以肉醬兩瓿遺君遂去不復見開視醬瓿皆麩金也兩瓿者非兩大甕之類乎鱠魚再活洞賔遊廬山酒肆見剖魚作鱠曰吾令此魚再活鱠者不信洞賔以藥一粒納魚腹中良久跳躑如生鱠者驚試放於江圉圉洋洋悠然而逝覓洞賔不見寳輪現相紹興中一縣官喜道術建大齋寳籙宫方士大集角技能洞賔詭姓氏寓焉自贊其能異衆取藥少許寘諸掌吹數過俄紅暈四溢成寳輪相現洞賔二字衆大愕覓之不見矣小兒化鶴常州天慶觀真仙堂塑洞賔像有小兒賣荳日過其前見其儀狀敬仰之每盤旋不忍去一日瞻視嘆息間像忽微動引手招之持一錢買荳兒不取錢悉以畚中荳與之像有喜色以紅藥一粒授焉使吞服即覺恍惚如醉還家索紙筆作文章詞翰皆美至于天文地理無所不通不茹烟火食唯飮酒啖棗如是歳餘聞巿曹决死囚急徃觀正行刑之際忽空中有人批其左頰一小鶴從口吻角飛出捫其頰已半枯矣遂愚俗如初寘錢兒手台州仙居民王三入市逢乞子賣泥塑吕先生像買歸供事之香火甚肅小兒年十歳許亦每日敬拜嘗牧牛山坡見白衣道人過前亟從牛背躍下挽其袍呼爲吕先生道人曰汝安得以此見稱且何爲識我兒云你便是我家供養的面目衣裳一般只是身體長大不同耳道人笑將一錢寘兒手戒之曰汝要買物喫時但用此儘取儘有惟不得向人說兒喜歸家宻白其父開手示之纔用一錢畢又有一錢在手經月餘父忽起無厭之心施行畚於傍命兒伸手拂之不已錢隨而墜下至三日所得十餘千明日不復有矣餅店洗木青城道會時會者萬什縣民徃徃旋結屋山下以鬻荼果有賣餅家一店祈願解之日一客被酒造其居醉語無度泥卧門左餅師殊苦之與之錢不受飼之餅不納先是風折大木居民解爲二凳正臨門側以待過客店去江頗遠方汲水二器未及用忽起縛茅爲箒蘸水洗木搰搰踰兩時又卧其上徃來望見者皆惡之及門即返餅終日不得賣客亦捨去辭主人曰毋怒我我明日携錢償汝直當倍售矣遂行或謁凳欲坐見光彩爛然乃濃墨大書吕先生生四字取刀刮之愈削愈鮮明深入木底上下如一觀者如堵自是餅果大售時紹興三十二年二月聞壽卿說親見其洗木時云一清癯道人也華亭附舟紹興二十八年華亭客商販蘆蓆萬領徃臨安巍然滿船晩出西栅一道人呼于岸欲附載商曰船已塞滿全無宿卧處我自露立豈能容爾道人曰與汝千錢但輟一席地足矣商曰遇雨奈何道人曰更與百錢買蘆蓆一領遇雨自覆商利其錢使登舟坐於蓆上僅容膝不見其飲食便溺在途亦無雨到北闕乃辭去曰謝汝載我使汝多得二十千相報商殊不曉適是年郊祀大禮青城用蘆蓆甚廣臨安府懼乏凡販此物至者每領增價錢二文盡買之遂贏二萬搬却既畢最下一領有墨書六大字曰吕洞賔曾附舟字晝遒勁好事者爭來觀視知爲仙翁明日商入城過衆安橋逢此道人賣薑于市揖之曰你原來是吕先生想能化黄金可多與我道人笑曰爲我守薑今還店取金來疾守至暮不復來乃畫輦薑歸商庸人也不復懊恨聞者爲之太醉繪仙像峽州遠安民篤言仙佛嘗作吕翁純陽會道流盛集齋罷一老兵從外來着青袍躡麻鞋挑兩箬籠弛擔踞坐呼叫索食却之不去其家尚有餘饌即與之又求酒舁以小樽一吸而盡至于再三皆然主人駭其量語之曰尚能飮乎曰固所願也但君家貴已多不敢請耳酒至到手即空不遺涓滴徐問今日何齋會告以故曰倘吕真人自來亦識之乎主人指壁間畫像示之客笑曰我却是他狀貌結束全與此别與我絹五尺當爲汝寫一本主人喜甚即取付客接絹不施粉墨但手中披莎俄而大吐以絹拭之主始惡焉度其已醉無可奈何傍觀皆唾罵引去良久納絹于空缾揖而去一童探缾中出絹展視仙像已成衣履穿結與客無異方悟真人下臨悔恨不遇表飾懸奉之時淳熙七年新昌鄒兼善主簿傳其事杜家園會飲紹興十六年王寅祖爲湖北提刑司指使僦舍于張四官人店武陵杜昌言家有小圃雜花正開以三月六日邀王張并外兩三客聚飲半酣各摘荼䕷插巾三俄一道人着青衣道服披簑背笠袖中各有物揖衆曰諸君高會能容我預席乎杜延之坐酌酒巨盃一飲而盡大嚼肉胾不留遺餘放箸微笑精神可掬請借酒爲諸人壽杜令少待道人曰吾亦有酒在此便當奉償仍付以一觴聽其滿勸坐客不敢辭獨謂王曰君氣宇軒昂有學道之質但恨世事未除耳且飮我酒即探袖取一錫缾度可容二升遍斟客酒原未嘗煖而熱味亦清醇杜異之視缾内尚有盞許道人曰能再飲一盃乎曰正欲之杜飲罷戲言此缾有酒幾何而斟之未竭公莫是洞賔先生否道人曰君又不曾見吕翁云云何也復笑曰諸君欲見之乎遂解背上箬笠擲起騰身丈餘跨一白鶴而去錫缾亦亡矣踐錢入石宋景泰間邵武軍衙前殷姓者香紙店常供雲水道人每以三錢施之未曾少倦一日有道人持椶扇乞錢適逢殷以他事遷怒形於面色連以三錢擲椶扇中隨墮於地道人以足踐之不顧而去殷乃自拾其錢則已固結磚上不能動矣觀者駭異道人杳然不見殷以鋤穵出磚見磚背有詩曰平生大願度三千直到於今不得圓特持此來應有意可憐殷氏骨難仙今此石砌在城隍廟中更名顯化一十六條吕元圭洞賔遊江夏詭爲吕元圭徃來居民楊氏家爲人言禍福事甚驗一日忽辭去曰惡人至矣吾將避之是夕提點刑獄喻陟行部至鄂首覓吕已不見得其平日所與徃還者岑文秀詰其所得岑曰無有喻厲以聲色將笞之岑答如故喻命搜其家得所遺卷長歌一首論内丹事喻省之曰此吕先生也元圭者折先生二字其惡人者謂喻迫之云思屯乾道人金陵萬鎡老人號與石性醇慕道以召箕自給每召即吕祖至一日忽夢吕祖與說八卦又夢言某日客來有手書可求之至期果客至求得其書乃卜事爲卜者十餘年隆慶庚午得末疾以帛絡臂左手執杖而行十一月二十一日早輿過普德寺下輿見一道人呼鎡爲老兒鎡應曰我不幸得偏枯疾乃如此道人厲聲曰何謂偏枯偏枯樹榮悴相半必屬之火人豈如是耶問疾始于何時曰今七月二十一日曰此宻雲不雨之象也鎡聞其言乃曰善藥乎曰不善炙乎曰不曰然則何以度日曰乞於巿鎡見繫一瓢曰乞用瓢乎曰然鎡問道人希姓曰乾又問號曰思屯曰何謂屯思之何也曰屯於義爲難思屯嘗以難自思也我六歲隨師故不知色若酒與財氣則尚有之但能自遣不似汝致跌爾又問荅良久爲說屯義乃曰今汝以肝氣致疾即屯也因呼老兒可徃橋上行鎡不覺扶杖行出寺東門又呼老兒再徃前一行鎡辭不能道人若略以手强拽者遂自橋及兩花之巖倚樹而坐以手捫鎡腰腎曰痠乎曰不又捫至膝曰痠矣又見手懸帛將手向衣内上下捫者三曰幸瘦可愈又曰爾五臟皆火不必藥惟武夷茶能解以東南枝生者佳烹以澗泉葉竪立投以井泉即横鎡感其意乃問所寓曰清元觀可問思屯乾道人因别去鎡歸其疾頓釋步履如初及人毛儔驚問其故曰公遇仙矣思者絲也加屯純也乾陽也所遇乃吕祖因至清元觀訪之止塑像在焉回道士滕宗諒子京謫守巴陵洞賔詭爲回道士上謁風骨聳秀談論俊辯子京異之口占詩贈之曰華州回道人來到宜陽城别我遊何處秋空一劒横洞賔大笑俄不見子京使人繪其像置于岳陽樓回道人江州太平宫道士十徐輩集于庫堂有客自稱回道人掉臂徑入傲睨四座衆恕相謂曰妄人紛紛多竊此名以自衒特可紹俗耳吾曹何取焉皆去弗顧唯胡用宗揖入坐小軒雍容款椄竒其風骨待遇加敬既而索酒飮徐顧左右覓刀刮士瀝酒漱液就掌搏和吹噓成墨錠擲之案上鏗然有聲語胡曰善藏之餌此亦能去病取視香氣四發郁然襲人殆非蘭麝可比復邀胡登樓飲酒辭以日暮笑而去明日胡趍郡未旦抵成門逢其自城中出笑而顧旋聞閽吏言半夜時回道人已在此候門矣胡益異之歸驗所假刀半已化金色稍服所遺之墨累年後貌不少改而酒量日增異日道人又至敝衫破帽蔴鞋草帶自挑二壼胡問壼胡所有傾視之皆藥銀也始悟爲真吕翁拜以師禮虔扣長生之術有更似南津港再遇吕公船之句其孫嘗岀其祖所繪黄襖翁像誠清峻絶俗云回道人洞賔遊長沙詭爲回道人持小瓦罐乞錢得錢無筭而罐常不滿人皆神之一日坐市道上言有能以錢滿吾罐者當授以道人爭以錢投罐竟不滿有僧驅一車錢戲曰汏罐能容之否道人唯唯及推車入罐戛戛有聲俄不見僧曰神仙耶幻術耶道人口占詩曰非神亦非仙非術亦非幻天地有終窮桑田幾遷變身固非我有財亦何足戀曷不從吾遊騎鯨騰汗漫僧益驚疑欲執之道人曰若惜此錢耶吾今償你取片紙投罐祝曰速推車出良久不出曰非我自取不可因跳入罐寂然僧擊罐碎有片紙題一詩曰尋真要識真見真渾未悟一笑再相逢驅車東平路僧帳然歸次東平忽見道人曰吾俟君久矣以車還之錢皆在曰我吕公也始謂汝可教今惜錢之念如此不可也僧方悔謝不及矣遊太平觀亦稱道人回處士尚書郞賈師雄藏古鐵鏡嘗欲淬磨洞賔稱回處士謁焉乞試其枝笥中取藥少許寘鏡上辭去曰俟更取藥來追之已不見但見所寓太平寺扉上題詩曰手内青蛇凌白日洞中仙果艷長春須知物外煙霞客不是塵中磨鏡人視鏡上藥已飛去一點光明如玉回山人熙寧元年八月十九日遇湖州東林沈山自稱回山人用石榴樹皮寫絶句於壁詩云西鄰已富憂不足東老雖貧樂有餘白酒釀來縁好客黄金散盡爲收書一稱回叟見後謁石國監條回後養洞賔遊秦州天慶觀時道流悉赴鄰郡醮席獨一小童在洞賔求筆欲書壁童辭以觀堂新修師戒毋污壁乃曰但煩貯火殿爐欲禮三清既徃見殿後池水清泚以瓜畫壁書日石池清水是吾心剛被桃花影倒沉一到邽山宫闕内銷閑澄慮七絃琴末題云回後養書壁絶高非手所能及衆嘆異始悟回爲吕後養者先生反對谷客元豐中東京有道人稱谷客與布衣滕忠同飮酒將起以藥一丸遺滕滕素有風癖服之即愈遂别又二年於揚州開明橋東遇谷客坐水次招滕滕取路跨橋而徃至則無所覩始悟其爲洞賔也怏怏未幾卒矣前吞軸題詩後潭州寓會俱稱谷客守谷客崔中舉進士道過巴陵旅寓邸歌沁園春樂章洞賔適以補蹊隱市井間質其所歌曰何曲也崔曰東都新聲也曰吾不解書子爲書吾詞崔爲書其詞曰七返還丹云云見第八卷崔問姓氏曰吾生江口長山口今爲守谷客翌旦訪太守言之此吕洞賔也亟令召之叩其户應聲漸遠再呼不應排户而入𨵙無人矣壁有詩曰腹内嬰兒養已成且居廛市暫娱情無端措大剛饒舌却入白雲深處行崔與太守歎恨而已昌虛中徽廟時有一道人自稱昌虛中徃來諸琳宫動履怪異飲酒無量啖生魚肉至數十斤引冷水數十斛天大雨雪平地七八尺餘自埋入雪中旬日不出雪霽復起行於深潭水面如履平地又善草書作枯藤遊絲勢一舉垂數千絡繹不斷人爭携楮以請徃徃不與昌字虛中吕字也無心昌老横浦大庾嶺有富家子慕道建庵接雲水士多年一日衆建黄籙大齋方罷忽有一襤褸道人至求齋衆不知恤或加凌辱道人題一詞曰暫游大庾白鶴飛來誰共語嶺畔人家曾見寒梅幾度花春來春去人在落花流水處花滿前蹊藏盡神仙人不知末書云無心昌老來五字作三樣筆勢題畢竟入雲堂良久不出迹之已不見徐視其字深透壁後矣始知昌字無心乃吕公也衆共歎惋患無心江西吉水縣大江之濱有玄壇觀一日道侣皆下山齋事止留小童在觀偶一道人青巾白袍緩步入觀投宿小童以師不在拒辭不許道人索筆題詩壁上云褰裳攬步尋真宿清景一宵吟不足月在寒潭風在松何必洞天三十六患無心書詩成擲筆而去次日師歸小童備述道人求宿吟詩意道衆徃觀字勢飄逸不凡向房内視之墨跡透壁方知爲純陽祖師筆也嘉靖三十九年洪水泛濫觀宇傾圮而詩壁挺然獨存灰泥不剥見者異之乃爲本地勢家强取舁至半途過一嶺傾落石上至今尚有灰跡墨痕存焉賔法師青城山丈人觀黄若谷風骨清峻戒行嚴潔常以天心符水三光正炁治疾良驗而得人財帛即以散施貧乏洞賔詭爲賔法師上謁留月餘所作符篆徃徃吹起皆爲龍蛇雲霧飛去治鬼召將必現其形通人言語足踏成雷目瞬成電呵氣成雲噴唾成兩又善畫不用筆墨但含墨水噴紙帛上自然成山川花木宫室禽獸人物之狀略加拂拭而已每畫得錢即巿酒與若谷痛飲若谷飲素無量每爲賔所困一日若谷問曰先生操行異常人必自神仙中來還可語吾道否曰子左足北斗七星缺其一奚能成道耶更一生可也若谷驚曰賔公殆聖人矣蓋其左足下有黑子作北斗七星狀而缺其一未嘗爲人所知故也復問壽幾何洞賔倒書九十四字于壁作兩圓相圍之即别去始悟兩圓相乃吕字而賔姓其字也後若谷四十九歲卒果符倒書之讖同客熙寧中江南有李先生者自號同客人持莎苙輪竽敲短板唱漁家傲叉爲鳴榔之聲以參之音清悲激如在青霄其詞曰二月江南山水路李花零落春無主一箇魚兒無覓處風和雨玉龍生甲歸天去人或與錢不受與酒即不辭後以甲辰二月終瘞之無尸始悟同客者即吕洞賔也黄襖翁長沙鍾將之仲山嘉定己已自金陵罷官歸舟次巴陵南津哺時俄覩一舟過焉舟中一黄襖翁風貌竒龐凝然伫立熟視仲山良乆仲山窺其蓬中無他物惟船頭有黑瓶罐十枚蓬前兩青衣童參差立仲山意其必徑渡既而僅行二丈許即回楫而黄襖翁已復端坐蓬後矣再熟視仲山良久俄失船所在仲山始謂爲巨商不與之語至是恍然驚訝知其爲異人也翼且徃吕仙庵拜禮真像果儼然衣黃衣亦有兩青童侍側而其貌則皆與昨日所見者惟肖也仲山自恨凡目不識真仙感歎無已作水調歌頭詞有更似南津港再遇吕公船之句次年下世其後仲山之孫嘗出其祖所繪黃襖翁真像示人誠爲清俊絶俗云晉謁儒門八條謁丁晋公丁晋公謂倅鄱陽洞賔和一秀才徃謁曰吾唐吕渭之孫也經史百家無不通究因與晋公言君狀貌大似李德裕他日出處皆如之後晋公果大拜而竄海外信似贊皇矣謁張參政張公洎早年家居洞賔謁之與公洎講周易併言孟予存心養氣之㫖公洎在後文章日進因索紙筆作八分書詩一章微示他日將佐鼎席之意卒章曰功成當在破瓜年後張果參政後十六歲卒俗以破瓜爲二八蓋其讖也謁武昌守武昌守倅一日對奕有道人不通姓氏直前曰吾國手也守試與奕纔下僅八子即曰太守負矣守曰汝子未盈局安知吾負道人曰吾子已分途據要津矣是以知之已而果然如是數局守皆負俄拂袖去不見守令人遍城尋之聞在郡治前吹笛纔至郡治前則聞笛聲在東門至東門則聞在西門至西門則聞在南門至南門聞在北門至北門則聞在黄鶴樓前道人走徃石照亭中不見但見亭中有詩曰黄鶴樓前吹笛時白蘋紅蓼滿江湄裏情欲訴誰能會惟有清風明月知末書一吕字謁鍾弱翁鍾傳弱翁帥平凉洞賔幅巾衣白紵衣上謁從牧童牽黄犢立庭下弱翁異其氣局閑雅指牧童曰道人能詩可賦此乎曰是兒自能之牧童大書曰草鋪橫野六七里笛弄晩風三四聲歸來飽飯黃昏後不脫簑衣卧月明既别人皆見其擔二大甕長歌出郭或報弱翁曰甕二口此吕公也亟追之不復見矣謁石國監石介守道爲國子監直講一方士稱回叟上謁袖出詩曰高心休擬鳳池遊朱紱銀章寵已優莫待禍來名欲滅林泉養浩預爲謀石遜謝不悟其㫖延以酒食日將夕叟辭石留之宿曰吾孤雲野鶴安可留也既而期年因賊孔直温謀逆石嘗有書與之坐貶卒謁王岳州太常博士王綸守岳州有道人上謁貌清癯短褐不掩骭語音清圓綸問世系回曰世系不必問所請教者奕碁耳與奕綸素號國手至是連負日云暮乃酌以酒問何方人回以詩曰仙籍班班有姓名蓬萊倦客吕先生凡夫肉眼知多少不及城南老樹精綸驚訝間已失之矣庭下煙雲滿然移時不散謁石舍人石舍人王休因避暑有襤褸樵夫持斧而前眉目秀整議論清快石問鄉里及世系曰老夫生于河南移居於終南山吕渭之裔也所學者莊子老子此外無所爲石曰終南有佳處曰佳處甚多因舉陶隱居詩曰終南何所有所有惟白雲只可自怡悅不堪持贈君石異之款留二日極談出有入無超生離死之法將别曰吾將徃岳陽以丹一粒遺石服之年九十餘面如嬰兒巴陵犯節洞賔行巴陵巿太守出犯節前驅執之太守置諸獄令書款日迨脯無一辭吏逼之洞賔曰須我酒醒吏曰汝不憂罪尚以酒爲解也言未竟俄失之但遺一幅紙曰暫别蓬萊海上游偶逢太守問根由身居北斗星杓下劒挂南宫月角頭道我醉來真箇醉不知愁是怎生愁相逢何事不相認却駕白雲歸去休太守驚曰此吕翁也夙興焚香謝過一日於水盆中見焉亟召畫史圖之與滕子京本絶類也終吕祖志輦三事蹟志經遊寺觀十條金鵝寺題詩洞賔抵四明金鵝寺顧方丈蕭然頃有童子出吕問此何寥寥曰莫道寥寥虛空也遂佳其言題詩于壁云方丈有門出不鑰見箇山童露雙脚問伊方丈何寂寥道是虛空也不着聞此語何欣欣主翁豈是尋常人我來謁見不得見渴心耿耿生埃塵歸去也波浩渺路入蓬萊山杳杳相思一上石樓時雪晴海闊千峯曉廬山寺見夢廬山開元寺僧法珍坐禪二十年頗有戒行一日定坐見一道人來謁問曰師謂道惟坐可乎珍曰然道人曰佛戒含嗔淫殺爲甚方其坐時自謂無此心矣乃其遇景遇物不能自克則此種心紛飛莫禦道豈專在坐乎因與珍歷雲堂見一僧方酣睡謂珍曰吾偕子少坐于此試觀此僧良久見睡僧頂門出一小蛇長三寸餘縁床足至地遇涕唾食之復循溺器飮而去及出軒外度小溝繞花臺若駐翫狀復欲度一小溝以水溢而返道人當其來徑以小刃插地迎之蛇見畏縮尋則徃至床右足循僧頂而入睡僧遽驚覺問訊道人及珍曰吾適一夢與二子言之初夢從左門出逢齋供甚精食之又逢美酒飲之因褰裳度門外小江逢美女數十恣觀之復欲度一小江水驟漲不能徃逢一賊欲見殺走從捷徑至右門而入遂覺道人與珍大笑而謂珍曰以床足爲門以涕唾爲供以溺爲醖以溝爲江以花木爲美女以刃爲賊人之夢寐幻妄如此珍曰爲蛇者何道人曰此僧性毒多嗔薰染變化已成蛇相他日瞑目即受生於蛇中矣可不懼哉吾吕公也見子精忱可以學道故來教子珍遂隨之而徃不知所終開元寺贈金袁州開元寺浴室有大井泉水甘冽洞賔愛之留連旬日因與一僧款宻僧朴野待之盡敬不知其爲洞賔也臨行以墨兩笏贈僧藏之篋笥不復省一日李大臨轉漕江西行部至袁尋僧問曰吕先生嘗贈汝金乎僧恍然曰我不識吕先生但前有道人到此贈我墨耳初無金也出墨示大臨則墨即金矣大臨摩娑駭異欲以他金貿易之僧弗受但以一笏轉贈之且問轉運使何自知此李曰昨過零睖見何仙姑問吕公動履何曰近吕過此自言乆客宜春與開元浴室僧相善喜其有仙風道骨以金遺之吾聞此語故來驗焉旬日洞賔復來問僧墨何在僧具以吿洞賔笑曰此女饒舌遂與僧携手出門去不知所之大雲寺會食洞賔詭爲回處士游大雲寺隨堂會食月餘謂寺僧曰僧饌甚精但少麵耳遂去旬日携少許麵至自炮設數百僧皆飽足僧請處士啜茗舉丁晋公詩曰花隨僧筯破雲逐客甌圓處士曰句雖佳未盡荼之理迺書詩曰玉蘂一鎗稱絶品僧家造法極功夫兔毛甌淺香雲白蝦眼湯翻細浪俱斷送睡魔離几席增添清氣入肌膚幽叢自落溪嵒外不肯移根入上都以丹一粒遺僧曰服此可不死遂别去後僧亦仙去山寺化艶婦洞賔嘗游山寺以劒化作一艷婦入寺僧行縱觀神馳志喪過雲堂前有一僧方趺坐獨不顧竟出門似若不動心者初以爲可教既出門則已候於無人之地意欲要而挑之女色蠱人罪根難滅此第一障道因縁也神光觀繪像洞賔遊山陽神光觀丐筆自繪己像於三清殿北墉眉目修整貌古怪不類世所傳上有北斗七大星君相被髮秉珪立傍作一符徑丈餘書曰元祐二年作如知吾下筆處可與語道人以疾刮符服之徃徃良已或見神人儀觀甚偉曰吾神光符使也訴暴露以暮區之平都觀訪友四川忠州屬有平都山前漢王方平後漢隂長生二人求仙同隱此山之中有平都觀有丹鼎亭有下棋亭吕祖曾兩訪之其一詩云盂蘭清曉過平都天下名山所不如兩口單行人不識王隂空使馬蹄虛其二詩云一鳴白鳥出青城再謁王隂二友人口口惟思三島好擡眸已過洞庭春太平觀題詩江州太平觀道士有高志洞賔訪之贈詩曰落魄薛高士年高無白髭雲中閑卧石山裏冷尋碑誇我飲大酒嫌人說小詩不知甚麽漢一任輩流嗤末小書云回道人同三客訪薛鍊師作始知洞賔併寓其字天慶觀題詩宿州符離縣天慶觀有甯道士少年談老莊有竒趣一日晨興有賣藥道人至即洞賔也儀狀雄偉徃來彌月因有老莊之要㫖授道士曰吾觀禪學皆出於老莊縱千經萬卷反覆議論要自立箇門庭源流授受其實皆本於老莊之㫖也臨别題二絶句於扉上作大篆體勢飛動一曰秋景董條葉亂飛庭松影裏坐移時雲迷鶴駕何方去仙洞朝元失我期二曰肘傳丹篆千年術口誦黃庭兩卷經鶴觀古壇松影裏悄無人跡户長扃既去人爭刮以治疾良已字入木寸餘墨迹不滅單州天慶觀題詩元豐中吕惠卿守單州天慶觀七月七日有異人過焉書詩于紙一曰四海孤游一野人兩壺霜雪足精神坎離二物君收得龍虎丹行運水銀一曰野人本是天台客石橋南畔有舊宅父子生來有兩口多好歌笙不好拍惠卿婿余中解之曰後篇第一句賔字也第二句石橋者洞也第五句兩口者吕也第四句者吟也吟此詩者其洞賔乎市廛混迹八條邵城酒肆邵州城外有老媪開酒肆一日有吕道人來索飮偶無酒媪以所餘濁酒一升與之道人問價媪曰每升錢二十文道人以指點酒書二十字于門外一紫石上而去徐視則字迹下透石底幾尺餘自是觀者如堵酒肆大售後人因其居建集仙觀永康酒樓永康軍倪某新開酒樓有一道人至索飲自旦及暮飲佳醖圮及石餘衆怪相聚以觀倪需酒金道人瞪目不語頽然醉倒倪坐守之曙皷動道人忽起援筆題詩于壁曰鯨吸鰲吞數百杯玉山誰起復誰頽醒時兩袂天風冷一朵紅雲海上來末書云三山道人陽純作以土一塊擲倪面走出門仰望東北一朵紅雲而來撫掌大笑俄不見刮視其壁墨徹數分視土塊乃良金也自是酒樓大售始知陽純者乃純陽也汴京茶肆後周末汴京有石氏設茶肆一女尚髫齔令行茶洞賔詭爲丐者日徃據上坐求茶衣服襤褸血肉垢污殆不可近女殊無厭惡意益取上茗待之父母怒笞女女益待之月餘無厭洞賔謂女曰汝能啜我所飲茗之餘乎女以穢甚不可下咽覆之地忽聞異香亟䑛之神氣爽然洞賔曰我吕先生非丐者惜爾不能盡食吾餘然吾能從爾願欲富乎貴乎壽乎女曰我小家子不識何爲貴得富且壽足矣洞賔去不復來後年亦貴顯年百三十五歲終長溪飯店福州長溪縣老嫗開飯肆乾道中有道人來食畢以火紫頭書壁作吕洞賔來四字光艷竒偉太守聞之騎徃觀則字已銷没無復餘迹信神筆也兖州妓館兖州妓侯其姓者爲邸以舍客洞賔詭服求授館蚤出暮歸歸必大醉逾月不償一金侯召啜茶洞賔曰吾見鍾離先生謂汝可以語道侯不省以酒飲之洞賔索飲不已侯滋不悅洞賔伸臂示之金釵隱然解其一令巿酒侯利其金曰飲罷寢此乎曰可也即登榻鼻齁齁至夜分侯迫榻洞賔以手拒之侯亟去遲明失洞賔所在視其身則手所拒處吕字徹肌上侯感悟曰此吕公也得非宿世一念之差遂至於此公其來度我乎即斷髮布裘尋洞賔不知所終廣陵妓館廣陵妓黄鶯有姿色豪客填門一日有吕秀才托宿黄以其襤褸垢污拒之秀才題二詩于屏一曰嫫母西施共此身可憐老少隔千春他年鶴髮鷄皮媪今日玉顔花貌人二曰花開花落兩悲歡花與人還事一般開在枝間防客折落來地上請誰看題畢俄不見東都妓館有妓楊柳東都絶色也道人來徃其家屢輸金帛然終不與揚交接楊一夕乘醉迫之道人曰吾先天坎離配合身中夫婦内交聖胎已結嬰兒將生豈復戀外色乎内交之樂過於外交之樂遠矣楊疑訝其語時宰相張天覺館賔蕭某與久狎楊以告蕭而蕭以吿張遽徃即之道人大呼疾走徑趨棲雲庵雲堂不出良乆排闥尋之則已不見惟壁上有詩曰一吸鸞笙裂太清緑衣童子步虛聲玉樓喚醒千年夢碧桃枝上金鷄鳴後庵遺火無孑遺而題詩之壁歸然獨存亦一異也平康妓館平康妓館一夜有男子過被諸妓牽扯男子連聲噉叫殺人夜巡捉數妓並男子赴官根虎妓說並不曾殺人押下男子實供因自稱爲吕仙寫詩二首其一云二八佳人體似酥腰間仗劒殺愚夫雖然不取人頭落暗裏能教骨髓枯其二云六幅紅裙卓地棚就中險設陷人坑王侯宰相渾遭陷留得先生獨自醒詩成回顧不見乃知是爲吕祖也庵堂赴會七條徽宗齋會宋宣和間徽宗齋設一千道人只闕一名適有一風癩道人求齋監門官力拒之其時徽宗與道士林靈素便殿談話而道人忽在其階下亟遣人送去赴齋道人以布袍袖在殿柱上一抹而徃徽宗見而怪之起身觀柱上有粉字書云高談闊論若無人可惜明君不遇真陛下問臣來日事請看午未丙丁春果而靖康丙午丁未二帝北狩之難青城鶴會紹興末洞賔赴青城山鶴會憩一賣餅果人家人不之識也頗異之洞賔濃墨大書詩一章于門之大木上曰但患去針心真銅水换金鬢邊無白髮騋馬去難尋蓋寓吕洞賔來四字筆勢偉勁光彩殊常取刀削之深透木背洞賔已不復見時士人關雲祥者見之即繪其像乃一清癯道人也是後餅果大售潭州鶴會潭州兵馬都監趙不問淳熙九年四月十四日作鶴會一道人不知所從來攝衣升戺不與人揖徑入知堂房内不見但於几上得一幅紙書絶句云這回相見不無縁滿院風光小洞天一劒當生又飛去洞庭驚起老龍眠末題谷客書紹興道會會稽山紹興癸丑道會有道人携凉笠而至會散乃掛笠於壁無掛笠之物而不墜題詩云偶乘青帝出蓬萊劒戟崢嶸遍九垓我在目前人不識爲留一笠莫沉埋賈相齋會賈平章母兩國夫人設雲水道人齋忽有群道人拱一孕婦將産而來齋未罷産嬰兒在地群道人即扶女子而去只留嬰兒在地衆人扶起嬰兒乃一劒袋也始知爲吕公以戲凡俗云白雲掛搭吉州舊有白雲堂在龍慶寺近嘗有道人在堂掛搭喉下復有一口以吹鐵笛吹訖復塞以紙笠上題兩句云一聲吹動斜陽外喚起江湖萬里心小孩群尾其後輒將銅錢撒地使競取之後題一詩於後堂云牽牛與織女依舊白蓮堂遂去皆莫曉其意後郴州寇李元礪反白雲堂閉門不容掛搭以防奸細三年後復開開之日乃七夕後一日也始悟其詩及悟二口吕字也江州掛搭江州瑞昌縣潘安撫道場適有道人至求掛搭無包無傘僅有一笠襤褸村俗直堂鄙之曰你無傘無包奈何掛搭道人曰既不許掛搭覓一茶即去直堂入令之坐及出則道人反坐主席直堂怒曰不知賔主禮做甚道人道人不揖而去遺下一笠直堂不能舉遂會衆諷經謝罪方舉其笠地上有吕字人病取土煎湯服之立愈數年間遂成一井水泡上結成吕字劃開復聚至今尚存丹藥濟人十一條文思院醫瘰趙應道監文思院日有親事官患瘰癧度不可療來辭院官且謂其徒曰吾旦夕死矣老母無托奈何衆强慰勉之或爲泣下纔出外即有道人隨之行行未遠語之曰瘡易愈令買紙二幅以爪掐其中爲二方竅徑可三寸許以授之謂曰俟夜燒一幅爲灰調乳香湯塗傅留其一劑以濟後人其人既歸如言貼藥畢就枕及寤已覺瘡痕蕩盡痂亦不見徑走謁院官談其異衆悟曰兩方竅吕字也得非以瀕死念母一言起孝故仙翁救之耶趙州醫跂趙州貧民劉某病跂二十年每夕炷香禱天一日有道人手携鐵瓢謂劉曰可隨我行劉隨之行二里許指地下曰此下深三尺餘有五色石試掘之果得一石大如彈丸五彩殊常道人曰子可持歸暴露九日細末以木瓜皮煎湯服俟愈可來城東駐雲堂東廊第三間左壁上再相會云劉疾脫然即徃尋之但見壁有洞賔像携瓢云江陵醫眼江陵傅氏家貧以鬻紙爲業性喜雲水士見必邀迎隨其豐儉款接里巷呼爲傅道人舍後小閤塑吕翁像坐磐石上旁置墨籃以泥竹片作墨數笏朝暮焚香敬事拜畢扃户去梯雖妻子不許至乾道元年正旦獨坐鋪中一客方巾布袍入共語良久起曰吾適有百錢能過酒肆飮否傅從之自是數日一來或留飲或與飯傅目昏多淚教取生熟地黄切焙取椒去日及閉口者微炒三物等分煉蜜爲丸每五十丸空腹鹽米湯飲下之傅如方治藥一月日明夜能視物徃還半歲忽别去三兩日外將徃襄陽能與我偕西乎辭以累重不可出客笑曰吾知汝不肯去取筆書利巿和合四字付之曰貼于鋪壁獲息當百倍復拉請酒肆酌别袖出紙包有墨數片曰欲携去襄陽做人事暫寄君所臨行來取之酒罷傅歸寘墨架上踰兩月客不至試啓視之乃吕翁像前竹皮所作者探閤内籃中無有矣始悟客爲吕翁深悔不遇乃貼四字于壁生意日豐享壽八十九耳聦目明精力如少年云安豐醫娼元佑末安豐縣娼女三香得惡疾拯療不痊貧甚爲客邸以自給會有寒士來託宿欲得第一房主事僕見其襤褸甚拒之三香曰貧富何擇焉便延入少頃士聞呻痛聲甚苦問其故僕以吿士曰我能治此症三香大喜士以箸鍼其口曰回心回心是時殊未曉門外有皂莢樹甚大久枯死士以藥粒寘樹竅中以泥封之俄失士所在是夕樹生枝葉旦而蔚然三香疾頓愈始悟回之爲吕遂棄家尋師邑人于其地建吕真人祠紹興十四年三香忽還郷顔貌韶秀邑老人猶有識之者武翼大夫子澤爲郡守召問之不肯深言後不知所之岳陽貨藥洞賔遊岳陽詭名貨藥一粒千金三日不售乃登岳陽樓自餌其藥忽騰空而立衆方駭慕欲買其藥洞賔笑曰道在目前蓬萊跬步撫機不發當面蹉過乃吟詩曰朝游北越暮蒼梧袖裏青蛇膽氣麄三入岳陽人不識朗吟飛過洞庭湖成都持丹成都藥巿日有道人垢面鶉衣手持丹一粒大呼干巿曰我吕洞賔也有能再拜我者以丹餌之衆以爲狂相聚笑隨之道人徃還數四竟無拜之者道人徃坐五顯廟前大池上兒童爭以瓦礫擲之道人笑曰世人欲見吾甚切既見吾又不識吾亦命也吕乃自餌金丹俄五色雲周身有頃不見衆共悔恨絳紗褁藥東京一歳民大病瘧有老姥家鬻茶子孫皆病一日有道人來姥善待之以子孫病爲請道人曰翌旦待我姥早起待之道人以絳紗褁藥曰病發者使執之悉愈一丸可愈百人過百人即不驗矣姥從之子孫皆愈遍療及百人滿果不驗矣姥拆囊已不見藥但有書吕洞賔三字而已方知遇吕先生孝感救母桐廬有通守忘其姓名以母病發背百方不瘥祈禱備至感洞賔夜夢之曰公至孝感天命余救拔若遲一日不復可療乃授以靈寳膏方栝蔞五枚取子乳香五塊如棗大二味各細研以白沙蜜一斤同熬成膏每服三錢温酒化下通守巿藥治服即愈後以施人立效覺能得丹黄覺能有詩名一日送客東都門外旅次見一羽士因携酒餚呼羽士共享之畢羽士舉盃摭水書吕字且曰明年江南見君明年果調官江南復見洞賔與以大錢七其次十又其次小錢三曰數不可益也吾以藥數丸遺子歲旦以酒磨服可一歲無病覺如其言至七十三歳藥亦垂竭卒於東京德成得丹李德成能醫盛寒時遇一貧窘道士衣單衣無寒色與李入酒肆自據主席李怪之店者曰交錢取酒道士指店中取三酒瓶曰中各有一升酒錢店者視之果然乃以三升酒與之道士酌酒飮李止取一瓶二瓶自竭語李曰此小術耳吾吕洞賔也李驚喜道士書一絶曰九重天子聚中貴五筭諸侯門外尊爭似布衣狂醉客不教性命屬乾坤以藥一粒遺李曰服此當享高壽即别去李服藥髮不白齒不落百七歲而卒建祠傳方孫應期别墅左有隙地一塊四圍環把水木清竒默意欲造純陽一室未幾有一襤褸道人至揖伽跌上坐袖中出故紙藥方書二册指示孫云公可常服此古方六味補隂丸甚好又授以叅同悟真口訣自云周姓野仙天長人留飲醉歸過山而去再顧不知所之孫乃搆室塑像以祀云藥方録後固本補隂丸生地黃姜汁炒熟地黄酒浸焙天門冬去心麥門冬去心各二兩人參一兩杏仁三錢俱磨爲膏以上煉蜜爲丸如桐子大每服七八十丸空心鹽白湯或酒送下如服煎劑合六味等分撮之久服功效甚速甚驗因縁會過四條茅山度老兵紹興二十年茅山大修醮事江東運使鄭清卿王亦顔同徃縱觀至午憩於茅舍遇道人白苧衫青布巾修眉美髯風骨清俊鄭王相謂曰豈非吕仙翁乎召與語命之坐酌酒數行兩主人皆已醉謾問客曰能更進否曰能可飮幾何曰無筭乃令侍史注酒兩壺於銀盆中恣其痛飲一杯復一杯不已鄭曰先生如有藥求數粒曰有即引手擦左腋下垢汗撚成青粒與之曰只可嗅不得喫王亦求之復擦右腋下汙成紅粒與之所言亦然酒盡客去先是一老兵守邸閣一漕老兵卧簷間日晏未醒漕因戲以兩藥納其鼻中氣即吸入猶未覺使人喚之起問曰汝覺四體如何曰覺得極輕殆欲凌雲耳明日騰空而去二漕相視悔恨無縁蓋假手以度老兵也何仙遇道何仙姑零陵市道女也始十三歳隨女伴入山採荼俄失伴獨行迷歸路見東峯下一人修髯紺目冠高冠衣六銖衣即洞賔也仙姑始僕僕亟拜之洞賔出一桃曰汝年幼必好果物食此盡他日當飛昇不然止居地中也仙姑僅能食其半髯者指以歸路仙姑歸自謂止一日不知已逾月矣自是不饑無漏洞知人事休咎後尸解去洞賔嘗謂仙姑曰吾嘗遊華隂巿中賣藥以靈丹一粒置他藥萬粒中有求藥者於瓢中信手採取與之觀其縁分也如是數日他藥萬粒探取八丁而此丹入手即墜因歎世間仙骨難值如此跛仙遇道長沙劉跂仙遇洞賔於君山得靈龜吞吐之法功成歸隱岳麓自號瀟湘子常侍洞賔徃來抱黄洞賔數遊城下有詩曰南山七十二獨愛洞真墟後有鄭思者遇跂仙于清泰門外相與俱仙云道友講經陳澹然富而儒者也性慕道延雲水士多年竟無所遇洞賔詭爲傭者爲治圃歲餘所作工役力過常人陳愛之然止以傭者待之而已一日陳與一道友講隂符經至天發殺機天地返覆未曉殺機之㫖洞賔從旁抗聲曰生者不生死者不死已生而殺生未無而學死則長生矣陳大罵曰汝非傭者邪誰教汝爲此言既而詰之則復繆愆其辭不可解道友曰田野村夫定於何處竊得此語耳非實通曉也居無何忽辭陳曰吾將遠行明年五月五日午時復來也既去寂然陳有郷人客于巴陵遇之曰爲我寄語陳公我吕洞賔也始意公可授道徐察之則不然吾不復來矣言訖走入吕仙亭竹林中不見明年端午日午時陳公暴卒吕祖志三卷終吕祖志輦四藝文志五言古風一篇又記數載樂幽幽欲逃寒暑逼不求名與利猶恐身心役苦志慕黃庭慇勤求道跡隂功暗心修善行長日積世路果逢師時人皆不識我師機行宻懷量性孤僻解把五行移能將四象易傳余造化門始悟希夷則服取兩般真從頭路端的烹煎日月壼不離乾坤側至道眼前觀得之元咫尺真空空不空真色色非色推倒玉葫蘆迸出黄金液緊把赤龍頭猛將驪珠吸吞歸臟腑中奪得神仙力𥘤號一黍珠延年千萬億同途聽我吟與道相親益未曉真黄芽徒勞遊紫陌把住赤鳥魂突出銀蟾魄未省此中玄常流容易測三天應有路九地終無厄守道且藏愚忘機要混迹群生莫相輕已是蓬萊客七言古風二篇贈劉方處士六國愁看沉與浮携琴長嘯出神州擬向煙霞煑白石偶來城巿見丹丘受得金華出世術期於紫府駕雲遊年來摘得黄巖翠琪樹參差連地肺露飄香隴玉苗滋月上碧峯舟鶴唳洞天消息春正深仙路徃還俗難繼忽因乘興下白雲與君邂逅於塵世塵世相逢開口希共論太古同流志瑶琴寳瑟與君彈瓊漿玉液勸我醉醉中亦話興亡事云道無珪組累浮世短景倏成空石火電光看即逝韶年淑質曾非固花面玉顔還作土芳樽但繼曉復昏樂事不窮今與古何如識箇玄玄道道在杳冥須細考壼中一粒化竒物物外千年功力奥但能制得水中華水火翻成金丹龜丹就人間不久居自有碧霄元命誥玄洲暘谷悉可居地壽天齡永相保鸞車鶴駕逐雲飛迢迢瑶池應易到耳聞爭戰還傾覆眼見妍華成枯槁唐家舊國盡荒蕪漢室諸陵空白草蜉蝣世界實足悲槿花性命莫遲遲珠璣溢屋非爲福羅綺滿箱徒自危志士戒貪昔所重達人忘欲寧自期劉方劉方審聽我流光迅速如飛過隂婬果决用心除尸鬼因循爲汝禍八瓊秘訣君自識莫待鈆空車又破破車壞鈆須震驚直遇伯陽應不可悠悠憂家復憂國耗盡三田元宅火咫尺玄關若要開憑君自解黄金鎖贈喬二郞與君相見皇都裏陶陶動便經年醉醉中徃徃愛藏真亦不爲他名與利勸君休戀浮華榮直須奔走煙霞程煙霞欲去如何去先須肘後飛金晶金晶飛到上宫裏上宫下宫通光明當時玉录涓涓止奔歸元海如雷聲縱此夫妻相際會歡娱一作始終踴躍情無外水火都來兩平間掛候翻成地天泰一浮一沉陽煉隂隂盡方知此理深到底根元是何物分明只是水中金喬公喬公急下手莫逐烏飛兼兔走何如修煉作真人塵世浮生終不乆大道長生没得來自古至今有有有五言絶句四首賜齊州李希遇少飲欺心酒休貪不義財福因慈善得禍向巧姦來題紫極宫宫門一閑入臨水憑欄立無人知我來朱頂鶴聲急贈沈處士貞吉二首鶴背發長歌清聲振林越萬里洞庭秋湖波弄明月片月已蒼蒼詩成天欲曙獨鶴忽不見閒雲自來去五言律詩一十八首悟了長生理秋蓮處處開金童登錦帳玉女下香階處嘯天魂住龍吟地魄來有人明此道立便返嬰孩姹女住南方身邊產太陽蟾宫烹玉液坎户煉瓊漿過去神仙餌今來到我嘗一杯延萬紀物外任翱翔頓悟黃芽理隂陽禀自然乾坤爐裏煉日月鼎中煎木產長生汞金生續命鉛世人明此道立便返童顔宇宙産黄芽經爐煅作砂隂陽烹五彩水火煉三花鼎内龍降虎壼中龜遣蛇功成歸物外自在樂煙霞要覓長生路除非認本源都來一味藥剛到數千般丹鼎烹成汞紅爐煉作鉛依時服一粒白日上沖天姹女住瑶臺仙花滿地開金苗從此出玉蘂自天來鳳舞長生曲鸞歌續命盃有人明此道海變已千回古徃諸仙子根元占甲庚水中聞虎嘯火裏見龍行進退窮三候相吞用八紘沖天功行滿寒暑不能爭我悟長生理太陽伏太隂離宫生白玉坎户産黄金要主君臣義須存子母心九重神室内虎嘯與龍吟靈丹產太虛九轉入重爐浴就紅蓮顆燒成白玉珠水中鉛一兩火内汞三銖喫了瑶臺寳升天任每枯姹女住離宫身邊產雌雄爐中七返畢鼎内九還終悟了魚投水迷因鳥在籠耄年服一粒立地變冲童道德乾坤祖隂陽是本宗天魂生白虎地魄產青龍運寳泥丸住搬精入上宫有人明此法萬載貌如童要覓金丹理根元不易逢三才七返足四象九還終浴就微微白燒成漸漸紅一丸延萬紀物外去冲冲箇箇覓長生根无不易尋要貪天上寳須棄世間琛煉就水中火燒成陽内隂祖師親有語一味水中金萬物皆生玉如人得本元青龍精是汞白虎水爲鈆悟者子投母迷應地是天將來物外客箇箇補丹田二十四神清三于功行成寒雲連地轉聖日滿天明玉子偏宜種金田豈在耕此中真妙理誰道不長生玅玅玅中玅玄玄玄更玄動言俱演道語默盡神仙在掌如珠異當空似月圓他時功滿後直入大羅天宻室靜存神隂陽重一斤煉成離女液嚥盡坎男津漸變逍遥體超然自在身更修功業滿旌鶴引朝真通道復通玄名留四海傳交親一柱杖和氣兩空拳要果逡巡種思茶逐旋煎豈知來混世不久却回天七言絶句四十二首捉得金精固命基日魂東畔月華西於中煉就長生藥服了還同天地齊莫怪瑶池消息稀只縁人事隔天機若人尋得水中火有一黄童上太微混元海底隱生倫内有黄童玉帝名白虎神符潜姹女靈元鎮在七元君三畆丹田無種種種時須借赤龍耕曾將此種教人種不解沿池道不生閃灼虎龍神劒飛好憑身事莫相違傳時須在乾坤力便透三清入紫微不用梯媒向外求還丹只在體中收莫言大道人難得自是功夫不到頭飮酒須教一百盃東浮西泛自梯如日精能與月華合有箇明珠走上來不負二光不負人不欺神道不欺貧有人問我修行法只種心田養自身時人若擬去瀛洲先過巍巍十八樓自是電雷聲震動一池金水向東流瓶子如金玉子黄上升下降續神光三元一會經年淨這箇天中日月長學道須教徹骨貧囊中只有五三文有人問我修行法遥指天邊日月輪我自忘心神自悅跨水穿雲來相謁不問黄芽肘後方玅道通微怎生說丹傳肘後千年術口誦黄庭兩卷經鶴觀古壇松影裏悄無人跡户長扃獨上高峯望八都黑雲散後月還孤茫茫宇宙人無數幾箇男兒是丈夫天下都游半日功不須跨鳳與乘龍偶因博戲飛神劒摧却終南第一峯趯倒葫蘆棹却琴倒行直上卧牛岑水飛石上迸如雪立地看天坐地吟吾家本住在天齊零落白雲鏁石梯來徃八千消半日依前歸路不曾迷黄峯道士高且潔不下蓮宫經歲月星辰夜禮玉簪寒龍虎曉開金鼎熱東山東畔忽相逢握手丁寧語似鍾劒術已成君把去有蛟龍處斬蛟龍朝泛蒼梧暮却還洞中日月我爲天匣藏寳劒時時吼不遇同人誓不傳猥仙拍手葫蘆舞過嶺穿雲拄杖飛來徃八千須半曰金州南畔有松扉養得兒形似我形我身枯椊子光精生生世世常如此爭似留神養自身精養靈根氣養神此真之外更無真神仙不肯分明說迷了千千萬萬人不事王侯不種田日高猶自抱琴眠起來旋點黄金買不使人間作業錢天涯海角人求我行到天涯不見人忠孝義慈行方便不須求我自成真莫道幽人一事無閑中儘有靜工夫閉門清晝讀書罷掃地焚香到日晡息精息氣養精神精養丹田氣養身有人學得這般術便是長生不死人斗笠爲帆扇作舟五湖四海任遨遊大千世界須臾至石爛松枯經幾秋或爲道士或爲僧混俗和光别有能苦海翻成天上路昆盧常點百千燈過洞庭湖君山午夜君山翫月回西鄰小圃碧蓮開天香風露蒼華冷雲在青霄鶴未來贈鳳翔府天慶觀得道年來八百秋不曾飛劒取人頭玉皇未有天符至且貨烏金混世流劒畫於襄陽雪中峴山一夜玉龍寒鳳林千樹梨花老襄陽城裏少人知襄陽城外江山好海上逢趙同南宫水火吾須濟北關夫妻我自媒洞裏龍兒嬌欝律山前童子喜徘徊贈劒客五首先生先生貌獰惡抜劒當空氣雲錯連喝三回急急去欻然空裹人頭落劒起星奔萬里珠風雷時逐雨聲麄人頭携處非人在何事高吟過五湖麄眉卓竪語如雷聞說不平便放盃使劒當空千里去一更别我一更回龐眉鬭竪惡精神萬里騰空一踴身背上匣中三尺劒爲天且示不平人先生先生莫外求道要人傳劒要收今日相逢江海畔一杯村酒勸君休贈曹先生鶴不西飛龍不行露乾雲破洞蕭清少年仙子說閑事遥隔彩雲聞嘆聲與潭州智度寺慧覺禪師有序余遊韶彬東下湘江今見覺公觀其禪學精明性源純潔促膝靜坐收光内照一衲之外無餘衣一鉢之外無餘食達生死岸破煩惱殻方今佛衣寂寂兮無傳禪理懸懸兮幾絶扶而興者其在吾師乎達者惟心兼濟物聖賢傳法不離真請師開說西來意七祖如今未有人閑題一首獨自行來獨自坐無限世人不識我惟有城南老樹精分明知我神仙過松枯石老水縈迴個裏難教俗客來擡眼試看山外景紛紛風急障黄埃呂祖志藝文志七言律詩六十首夾脊雙關透頂門修行逕路此爲根華池神水頻來嚥紫府元君徃渀潯常使氣沖關節透自然精滿谷神伸他年得赴瑶池會須感當初指教人調氣訣混混沌沌不計年一吸畧記五千言燒丹煉藥南山秀服氣吞霞九海乾曾經幾度鬚眉濫數番滄海變桑田陛下問臣年多少先有吾身後有天對君作我家至道本無爲白雪壺中配坎離常飲三盃無事酒閑行數着不爭棋抽鉛添汞存真體返本還元復命基會得兩般歸一處到頭端的上天梯叅玄作周行獨力出群倫黙默昏昏亘古存無象無形潛造化有門有户在乾坤色非色際誰窮處空不空中自得根此道非從它外得千言萬語謾評論通靈一顆正金丹不在天涯地角安討論窮經深莫究登山臨水杳無看光明暗寄希夷頂赫赤高居混沌端舉世若能知所寓超凡入聖弗爲難落魄紅塵四十春無爲無事信天真生涯只在乾坤鼎活計惟憑日月輪八卦氣中潛至寳五行光裏隱元神桑田改變依然在永作人間出世人獨處乾坤萬象中從頭歷歷運元功縱橫北斗心機大顛倒南辰膽氣雄鬼哭神號金鼎結鷄飛犬化玉爐空如何俗世尋常覓不達希夷不可窮誰信華池路最深非遐非邇奥難尋九年採煉如紅玉一日圓成似紫金得了永祛寒暑逼服之應免死生侵勸君門外修身者端念思惟此道心水府尋鉛合火鉛黑紅紅黑又玄玄氣中生氣肌膚换精裏含精性命專藥返便爲真道士丹還本是聖胎仙出神入定虛華語徒費工夫萬萬年九鼎烹煎九轉砂區分時節更無差精神氣血歸三要南北東西共一家天地變通飛白雪隂陽和合産金華終期鳳詔空中降跨虎騎龍映紫霞憑君子後午前看一脉天津在脊端金闕内藏玄谷子玉池中坐太和官只將至妙三周火煉出通靈九轉丹直指幾多求道者行藏莫離虎龍灘返本還元道氣平虛非形質轉分明水中白雪微微結火裏金蓮漸漸生聖汞論時非有體真鉛窮看亦無名吾今爲娘修行者莫問燒金問至精安排鼎竈煉玄根進退須明卯酉門繞電奔雲飛日月驅龍走虎出乾坤一丸因與紅顔主九轉能燒白髮痕此道幽微知者少茫茫塵世與誰論醍醐一盞詩一篇暮醉朝吟不記年乾馬屢來遊九地坤牛時駕出三天白龜窟裏夫妻會青鳳巢中子母圓提挈靈童山上望重重疊疊是金錢認得東西術與火自然爐鼎虎龍吟但隨天地明消息方識隂陽有信音左掌南辰攀鶴羽右檠北極剖龜心神仙親口留斯㫖何用區區向外尋一本天機深更深徒言萬劫與千金三冬大熱玄中火六月霜寒表外隂金爲浮來方見性木因沉後始知心五行顛倒堪消息返本還元在己尋虎將龍軍氣宇雄佩符持甲去匆匆鋪排劒戟奔如電羅列旌旗疾似風活捉三尸焚鬼窟生擒六賊破魔宫河清海宴乾坤淨世世安居道德中我家勤種我家田内有靈苗活萬年花似黄金苞不大子如白玉顆皆圓栽培全賴中宫土灌溉須憑上谷泉直候九年功滿日和根抜入大羅天尋常學道說黄芽萬水千山覓轉差有畛有圓難下種無根無脚自開花九三鼎内烹如酪六一爐中結似霞不日成丹應化骨飛昇遥指玉皇家四六關頭路垣平行人到此不須驚從教犢駕轟轟轉盡使羊車軋軋鳴渡海經河稀阻滯上天入地絶欹傾功成直入長生殿袖出神珠徹夜明九六相交道氣和河車晝夜迸金波呼時一一關頭轉吸處重重脉上摩電激離門光海嶽雷轟震户動婆娑思量此道真長遠學者多迷溺愛河金丹不是小金丹隂鼎陽爐裏面安盡道東山尋汞易豈知西海覓鉛難玄珠窟裏行非遠赤水灘頭去便端語得靈竿真的路何勞禮月步星壇古今機要甚分明自是衆生力量輕盡向有中尋有質誰能無裏見無形真鉛聖汞徒虛費玉室金關不解扃本色丹瓢推倒後却吞丸藥待延齡浮名浮利兩何堪迴首歸山味轉甘舉世筭無心可契誰人更與道相參寸猶未到甘談尺一尚難明强說三經卷葫蘆并拄杖依前擔入舊江南本來無坐亦無行行著之時是妄情老氏語中猶未决瞿曇言下更難明靈竿有節通天去至藥無根得地生今日與君無吝惜功成只此是蓬瀛解將火種種刀圭火種刀圭世豈知山上長男騎白馬水邊少女牧烏龜無中出有還丹象隂裏生陽大道基顛倒五行憑匠手不逢匠手莫施爲三千餘法論修行第一燒丹路最親須是坎男端的物取他離女自然珍烹成不死砂中汞結出長生水裏銀九轉九還功若就定將衰老返長春欲種長生不死根再營隂魄及陽魂先教玄女歸離户復遣空王鎮坎門虎到甲邊風浩浩龍居庚内水温温迷途爭與輕輕泄此理須憑達者論閉目存神玉户觀時來火候遞相傳雲飛海面龍吞汞風擊巖顛虎伏鉛一旦煉成身内寳等閑探得道中玄刀圭餌了丹書降跳出塵龍上九天千日工夫不暫閑河車搬載上崑山虎拍白汞安爐裏龍發紅鉛向鼎間仙府記名丹已熟隂司除籍命應還彩雲捧足歸何處直入三清謝聖顏解匹真隂與正陽三年功滿結成霜神龜出入庚辛位丹鳳翺翔甲乙方九鼎先輝雙瑞氣三元中换五毫光塵中若有同機者共住煙霄不死郷修生一路就中難迷者徒將萬卷看水火均平方是藥隂陽差互不成丹守雌勿失雄方住在黑無虧白自乾認得此般真妙訣何憂風雨妬衰殘纔吞一粒便安然十二重樓九曲連庚虎循環飱綘雪甲龍夭嬌迸靈泉三三上應三千日九九中延九萬年須得有縁方可授未曾輕泄與人傳誰知神水玉華池中有長生性命基運用須憑龍與虎抽添全籍坎兼離晨昏點盡黄金粉頃刻修成玉石脂齋戒餌之千日後等閑輕舉上雲梯九天雲靜鶴飛輕銜簡翩翩别太清身外紅塵隨意换爐中白石立時成九苞鳳向空中舞五色雲從足下生回首便歸天上去願將甘雨救焦氓嬰兒迤邐降瑶階手握玄珠直下來半夜紫雲披素質幾回赤氣掩桃顋微微笑處機關轉拂拂行時户牖開此是吾家真一子庸愚誰敢等閑猜才得天符下玉都三千日裏積工夫禱祈天地開金鼎收拾隂陽鎖玉壺便覺凡軀能變化深知妙道不虛圖時來試問塵中叟這箇玄機世有無誰識寰中達者人生平解法水中銀一條拄杖撑天地三尺昆吾斬鬼神大醉醉來眠月洞高吟吟去傲紅塵自從悟裏終身後贏得蓬壺永劫春紅爐迸濺煉金英一點靈珠透室明擺動乾坤知道力逃移生死見功程逍遥四海留蹤跡歸去三清立姓名直上五雲雲路穩紫鸞朱鳳自來迎時人若要學長生先是樞機晝夜行恍惚中間專志氣虛無裏面固元精龍友虎戰三周畢兔走烏飛九轉成煉出一爐神聖藥五雲歸去路分明亦無得失亦無言動即施功靜即眠驅遣赤牛耕宇宙分張玉粒種山川栽培不憚勞千日服食須知活萬年今日示君君好信教君見世作神仙不須兩兩與三三秪在崑崙第一巖逢潤自然情易伏遇炎常恐性難降有時直入三元户無事還歸九曲江世上有人燒得住壽齊天地更無雙本末無非在玉都亦曾陸地作凡夫吞精食氣先從有悟理歸真便入無水火自然成既濟隂陽和合自相符爐中煉出延年藥溟渤從教變復枯無名無利任優游遇酒逢歌且唱酬數載未曾經聖闕千年唯只在仙州尋常水火三回進真箇夫妻一處收藥就功成身羽化更抛塵坌出凡流杳杳㝠㝠莫問涯雕蟲篆刻道之華守中絶學方知奥抱一無言始見佳自有物如黄菊蕊更無色似碧桃花休將心地虛勞用煑鐵燒金轉轉差還丹功滿未朝天且向人間度有縁拄杖兩頭擔日月葫蘆一箇隱山川詩吟自得閑中句酒飲多遺醉後錢若問我修何妙法不離身内汞和鉛半紅半黑道中玄水養真金火養鉛解接徃年三寸氣還將運動一周天烹煎盡在隂陽力進退須憑日月權只此功成三島外穩乘鸞鳳謁諸仙返本還元已到乾能升能降號飛仙一陽生是興功日九轉周爲得道年煉藥但尋金裏水安爐先立地中天此處便是還丹理不遇竒人誓莫傳飛龍九五已升天次第還當赤帝權喜遇汞珠凝正午幸逢鉛母結重玄狂猿自伏何須煉野馬親調不着鞭煉就一丸天上藥頓然心地永剛堅舉世何人悟我家我家别是一榮華盈箱貯積登仙録滿室收藏伏火砂頓飲長生天上酒常栽不死洞中花凡流若問吾生計遍地紛紛五彩霞津能充渴氣充糧家住三清玉帝郷金鼎煉來多外白玉虛烹處徹中黄始知青帝離宫住方信金精水府藏流俗要求玄妙理參同契有兩三行紫詔隨鸞下玉京元君相命會三清便將金鼎丹砂餌時拂霞衣鶴駕行天上雙童持佩引月中嬌女執旛迎此時功滿參真後始信仙都有姓名修修脩得到乾乾方號人間一醉仙世上光隂催短景洞中花木任長年形飛峭壁非凡骨神在玄宫别有天唯願先生頻一顧更玄玄外問玄玄無心獨坐轉黄庭不遂時流入利名救老只存真一氣修生長遺百神靈朝朝煉液歸瓊府夜夜朝元養玉英莫嘆老人貧裡樂十年功滿上三清别客時人受氣禀隂陽均體乾坤壽命長爲産本宗能壽永因輕元祖遂淪亡三宫自有迴流法萬物那無運用方咫尺崑崙山上玉幾人知是藥中王别客青霄一路少人行休話興亡事不成金榜因何無姓字玉都必是有仙名雲歸大海龍千尺月滿長空鶴一聲深謝宋朝明聖主解書丹詔詔先生贈陳處上天網恢恢萬象䟽一身親到華山區寒雲去後留殘月春雪來時問太虛六洞真人歸紫府千年鸞鶴老蒼梧自從遺却先生後南北東西少丈夫哭陳先生羅浮道士誰同流草衣木食輕王侯世間甲子管不得壺裏乾坤只自由數着殘棋江月曉一聲長嘯海山秋飮餘回首話歸路遥指白雲天際頭贈羅浮道士三千里外無家客七百年來雲水身行滿蓬萊爲别館道成瓦礫盡黄金待賔袖裏常存酒化藥爐中别有春積德求師何患少由來天地不私親荅僧見天生一物變三才交感隂陽結聖胎龍虎順行隂鬼去龜蛇逆徃火龍來嬰兒日喫黄婆髓姹女時飧白玉杯功滿自然居物外人間寒暑任輪回吕祖志吕祖志輦五藝文志七言律詩六十一首星辰聚會入離鄉日月盈虧助藥王三候火燒金鼎寳五符水煉玉壼漿乾坤反覆龍收霧卯酉相吞虎放光入室用機擒捉取一丸丹點體純陽髮頭滴血眼如鐶吐氣雲生怒世間爭奈不平千萬事須期一訣蕩兇頑蛟龍斬處翻滄海暴虎除時拔遠山爲減世情兼負義劒光腥染點痕班雨雪霏霏天已暮金鍾滿勸撫焦桐詩吟席上未移刻劒舞筵前疾似風何事行盃當午夜忽然怒目便騰空不知誰是虧忠孝携箇人頭入坐中贈劒客二首金丹一粒定長生須得真鉛煉甲庚火取南方赤鳳髓水求北海黑龜精鼎追四季中央合藥遣三元八卦行齋戒興功成九轉定應入口鬼神驚碧潭深處一真人貌似桃花體似銀鬚髮未斑縁有術紅顔不老爲通神蓬萊要去如今去架上黄衣化作雲任彼桑田變滄海一丸凡藥定千春爐養丹砂鬢不斑假將名利住人間已逢志士傳神藥又喜同流動笑顏老子道經分付得紫微星許共相攀幸蒙上士甘撈摝處世輸君一箇閑贈人誰解長生是我栽煉成真氣在三台盡知白日昇天去剛逐紅塵下世來黑虎行時傾雨露赤龍耕處産瓊瑰只吞一粒金丹藥飛入青霄更不回亂雲堆裏表星都認得深藏大丈夫緑酒醉眠閑日月白蘋風定釣江湖長將氣度隨天道不把言詞問世徒山水路遥人不到茆君消息近知無鶴爲車駕酒爲糧爲戀長生不死郷地脉尚能縮得短人年豈不展教長星辰徃徃壺中見日月時時袖裏藏若欲時流親得見朝朝不離水銀行靈芝無種亦無根解飮能飧自返魂但得煙霞供歳月任他烏兔走乾坤嬰兒只戀陽中母姹女須朝頂上尊一得不回千古内更無塚墓示兒孫世上何人會此言休將名利掛心田等閑倒盡十分酒遇興高吟一百篇物外烟霞爲伴侣壺中日月任嬋娟他時功滿歸何處直駕雲車入洞天玄門弟子坐中央得筭明良感玉皇枕下山河和雨露笛中日月混瀟湘坎男會遇退金女離女交騰嫁木郞真箇夫妻齊守志立教牽惹在隂陽遥指高峰笑一聲紅霞紫霧面前生每於廛市無人識長到山中有鶴迎時弄玉蟾驅鬼魅夜煎金鼎煑瓊英他時若赴蓬萊洞知我仙家有姓名堪笑時人問我家杖擔雲物惹煙霞眉藏火電非他說手種金蓮不自誇三尺焦桐爲活計一壺美酒是生涯騎龍遠出游三島夜乆無人翫月華九曲江邊坐卧看一條長路入天端慶雲捧擁朝丹闕瑞氣徘徊起白煙鉛汞此時爲至藥坎離今日結神丹功能濟命長無老只在人心不是難玄門玄理又玄玄不死根元在汞鉛知是一般真箇衍調和六一也同天玉京山上羊兒鬧金水河中石虎眠妙要能生覺本體勤心到處自如然公卿雖貴不曾酬說者仙卿便去遊爲討石肝逢蜃海因尋甜雪過瀛洲山川醉後壺中放神鬼閑來匣裏收據見日前無箇識不如盃酒混凡流曾邀相訪到仙家忽上崑崙宴月華玉女控攏蒼獬豸山童提挈白蝦䗫時斟海内千年酒慣摘壼中四序花今在人寰人不識看看揮袖入煙霞火種丹田金自生重重樓閣自分明二千功行百旬見萬里蓬萊一日程羽化自應無鬼録玉都長是有仙名今朝得赴瑶池會九節幢旛洞裏迎因看崔公入藥鏡令人心地轉分明陽龍原向離宫出隂虎還於坎位生二物會時爲道本五方行盡得丹名修真道士如知此定跨赤龍歸玉清浮生不實爲輕忽衲服身藏竒異骨非是塵中不染塵焉得物外通無物共語難兮情兀兀獨自行時輕拂拂一點刀圭五彩生飛丹走入神仙窟莫性愛吟天上詩蓋縁吟得世間稀慣飧玉帝宫中飯曾着蓬萊洞裏衣馬踏日輪紅露捲鳳銜月角碧雲飛何時再控青絲轡又掉金鞭入紫微黄芽白雪雨飛金行即高歌醉即吟日月暗扶君甲子乾坤自與我知音精靈滅跡三清劒風雨騰空一弄琴的當南遊歸甚處莫交鶴去上天尋雲鬢雙明骨更輕自言尋鶴到蓬瀛日論藥草皆知味問着神仙自得名簪冷夜龍穿碧洞枕寒晨虎卧銀城米春又擬携笻去爲憶軒轅海上行龍精龜眼兩相和丈六男兒不奈何九盞水中煎赤子一輪火内養黄婆月圓自覺離天網功滿方知出地羅半醉好吞龍鳳髓勸君休更認彌陀强居此境絶知音野景離多不合吟詩句若喧卿相口姓名還動帝王心道袍薛帶應慵掛隱帽皮冠尚懶簪除此更無餘箇事一壼村酒一張琴華陽山裏多芝田華陽山叟復延年青松巖畔攀高幹白雲堆裏飮飛泉不寒不熱神蕩蕩東來西去氣綿綿三千功滿好歸去休與時人說洞天天心不散自然心成敗從來古與今得路應知能出世迷途終是任埋沉身邊至藥堪攻煉物外丹砂且細尋咫尺洞房仙景在莫隨波浪没光隂自隱玄都不記春幾回滄海變成塵玉京殿裏朝元始金闕宫中拜老君悶即駕乘千歳鶴閒來高卧九重雲我今學得長生法未肯輕傳與世人北帝南辰掌内觀潜通造化暗相傳金搥袖裏居元宅玉户星宫降上玄舉世盡皆尋此道誰人空裏得玄關明明道在堪消息日月灘頭去又還日影元中合自然奔雷走電入中原長驅赤馬居東殿大啓朱門泛碧泉怒拔混吾歌聖化喜陪孤月賀新年方知此是生生物得在仁人始受傳六龍齊賀得升乾須覺潜通造化權真道每吟秋月澹至言長運碧波塞晝乘白鶴遊三島夜頂金冠立古壇一載已成千歳藥誰人將袖染塵寰五岳灘頭景象新仁人方達杳㝠身天網運轉三元淨地脉通來萬物生自曉谷神通此道誰能理性欲修真明明說向中黄路霹靂聲中自得神欲陪仙侣得身輕飛過蓬萊徹上清朱頂鶴來雲外接紫鱗魚向海中迎姮娥月桂花生吐玉母仙桃子漸成下瞰日輪天欲曉定知人世久長生四海皆忙幾箇閑時人口内說塵縁知君有道來山上何以無名住世問十二樓臺藏祕訣五千言内隱玄關方知鼎貯神仙藥乞取刀圭一粒看割斷繁華掉却榮便從初得是長生曾於錦水爲蟬蛻又向蓬萊别姓名三住住來無否泰一塵塵在世人清不知功滿歸何處直跨虬龍上玉京當年時價滿皇都掉臂西歸是丈夫萬頃白雲獨自有一枝丹桂阿誰無閑尋渭曲漁翁引醉上蓮峯道士扶他日與君同際會竹溪茅舍夜相呼金鎚灼灼舞天階獨自騎龍去又來高卧白雲觀日窟閑眠秋月臂天開離花片片乾坤產坎蘂翻翻造化栽晩醉九嵒回首望北郞山下骨皚皚結交常與道清深日日隨他出又沉若要自通雲外鶴直須勤煉水中金丹成只恐乾坤窄餌了寧憂疾患侵未去瑤臺猶混世不妨盃酒喜閑吟因携琴劒下煙蘿何幸今朝喜暫過貌相本來猶自可針醫偏恨效無多仙經已讀三千卷古法曾持十二科些小道功如不信金階捨手試看麽傾倒華陽再醉三騎龍遇晚下南若眉因拍劒留星電衣爲眠雲惹碧嵐金液變來成兩露玉都歸去老松杉曾將鐵鏡照神鬼霹霹搜尋火滿潭鐵鏡烹金火滿空碧潭龍卧夕陽中麒麟意合乾坤地獬豸機關日月東三尺劒横雙水岸五丁冠頂百神官閑鋪羽服居仙窟自著金蓮造化功隨縁信業任浮沉似水加雲一片心兩卷道經三尺劒一條藜杖匕絃琴壼中仙藥逢人施腹内新詩遇客吟一味永添千載壽一凡丹點一斤金琴劒酒棋龍鶴虎逍遥落托水無憂閑騎白鹿遊三島悶駕青牛看十洲碧洞遠觀明月上青山高隱綵雲流時人若要還如此名利浮華即便休紫極宫中我自知親磨神劒劒還飛先差玉子開南殿後遣青龍入紫微九鼎黃芽棲瑞鳳一軀仙骨養靈芝蓬萊不是凡人處只怕愚人泄世機回身方始出埃塵造化工夫只在人早使亢龍抛地網豈知白虎出天真綿綿有路誰留我黙黙忘言自合神擊劒夜深歸甚處披星帶月折麒麟春盡閑閑過落花一回舞劒一吁嗟常憂白日光隂促每恨青天道路賒本志不求名與利元心只慕水兼霞世間萬種浮沉事達理誰能似我家日爲和解月呼丹華夏諸侯肉眼看仁義異如胡越異世情難似泰衡難八仙煉後鍾神異四海磨成照膽寒笑指不平千萬萬騎龍撫劒九重關别來洛汭六東風醉眼吟清慵不慵擺撼乾坤金劒吼烹煎日月玉爐紅杖揺楚甸三千王鶴翥秦煙幾萬重爲報晋城仙子道再期春色會稽峯未煉還丹且煉心丹成方覺道元深每留各有錢酤酒誰信君無藥點金洞裏風雷歸掌握壺中日月在胷襟神仙事業人難會養性長生自意吟鐵牛耕地種金錢刻石時童把貫穿一粒粟中